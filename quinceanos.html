<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quinceaños | Ensoñación & Fantasía</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Pinyon+Script&family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --dorado: #f8e4a1; 
            --rosa: #ffb7c5;   
            --oscuro: #0a0a0a;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--oscuro);
            height: 100%; width: 100%;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
        }

        /* --- FONDO DEL LIBRO MÁGICO --- */
        .portal-libro {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('./libro-magico.jpg') center/cover no-repeat;
            z-index: -1;
            filter: brightness(1.1);
            animation: openingBook 4s ease-out forwards;
        }

        /* Capa de luz para eliminar el fondo negro y dar brillo cinematográfico */
        .portal-libro::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, rgba(0,0,0,0.5) 100%);
            z-index: 0;
        }

        @keyframes openingBook {
            0% { transform: scale(1.1); filter: brightness(0.5) blur(10px); }
            100% { transform: scale(1); filter: brightness(1.1) blur(0px); }
        }

        /* --- TEXTOS MAGICOS --- */
        .fairy-tale-hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .letras-magicas {
            font-family: 'Pinyon Script', cursive;
            font-size: clamp(3rem, 10vw, 6rem);
            color: var(--dorado);
            margin: 0;
            text-shadow: 0 0 20px rgba(255,183,197,0.5);
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.2);
            opacity: 0;
            animation: fadeInText 3s ease-out 1.5s forwards;
        }

        .sub-leyenda {
            font-family: 'Cinzel', serif;
            letter-spacing: 8px;
            font-size: clamp(0.7rem, 2vw, 1.2rem);
            color: #fff;
            margin-top: 15px;
            opacity: 0;
            animation: fadeInText 2s ease-out 3.5s forwards;
        }

        @keyframes fadeInText {
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- BOTÓN DE WHATSAPP --- */
        .wsp-sello {
            position: fixed; bottom: 30px; right: 30px;
            width: 60px; height: 60px;
            background: radial-gradient(circle, var(--dorado) 0%, var(--rosa) 100%);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; color: black;
            text-decoration: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            border: 2px solid white;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div class="portal-libro"></div>

    <section class="fairy-tale-hero">
        <h1 class="letras-magicas">"Hoy cumples 15 años..."</h1>
        <p class="sub-leyenda">ENSOÑACIÓN & FANTASÍA</p>
    </section>

    <a href="https://wa.me/51930046681" class="wsp-sello" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

</body>
</html>
