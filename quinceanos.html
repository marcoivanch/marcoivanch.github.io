<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quinceaños | Ensoñación & Fantasía</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Pinyon+Script&family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --dorado: #f8e4a1; 
            --rosa: #ffb7c5;   
            --oscuro: #0a0a0a;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--oscuro);
            height: 100%;
            overflow: hidden;
        }

        /* --- PORTAL DEL LIBRO (RUTA ABSOLUTA DE TU DOMINIO) --- */
        .portal-libro {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            /* Usamos la URL que confirmamos que funciona en tu captura */
            background: url('https://maestrodeceremonias.org.pe/libro-magico.jpg') center/cover no-repeat;
            z-index: -1;
            animation: openingBook 4s ease-out forwards;
        }

        /* Capa de luz para eliminar el fondo negro y dar brillo */
        .portal-libro::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.4) 0%, rgba(255, 255, 255, 0.1) 100%);
            z-index: 0;
        }

        @keyframes openingBook {
            0% { transform: scale(1.1); filter: brightness(0.5) blur(10px); }
            100% { transform: scale(1); filter: brightness(1.1) blur(0px); }
        }

        .fairy-tale-hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            cursor: pointer;
        }

        .letras-magicas {
            font-family: 'Pinyon Script', cursive;
            font-size: 5.5rem;
            color: var(--dorado);
            /* Efecto cristal con filete rosado */
            text-shadow: 0 0 15px rgba(255,183,197,0.6);
            -webkit-text-stroke: 1.2px var(--rosa);
            opacity: 0;
            animation: fadeIn 3s ease-out 1.5s forwards;
        }

        .sub-leyenda {
            font-family: 'Cinzel', serif;
            letter-spacing: 6px;
            color: #1a1a1a;
            font-weight: bold;
            opacity: 0;
            animation: fadeIn 2s ease-out 3.5s forwards;
        }

        @keyframes fadeIn { to { opacity: 1; } }

        /* Sello de WhatsApp */
        .wsp-sello {
            position: fixed; bottom: 35px; right: 35px;
            width: 65px; height: 65px;
            background: radial-gradient(circle, var(--dorado) 0%, var(--rosa) 100%);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 32px; color: black;
            text-decoration: none;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            border: 2px solid white;
        }
    </style>
</head>
<body>
    <div class="portal-libro"></div>
    
    <section class="fairy-tale-hero" onclick="alert('Iniciando Capítulo I...')">
        <h1 class="letras-magicas">Hoy cumples 15 años...</h1>
        <p class="sub-leyenda">ENSOÑACIÓN & FANTASÍA</p>
    </section>

    <a href="https://wa.me/51930046681" class="wsp-sello" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>
</body>
</html>
