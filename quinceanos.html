<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quinceaños | Ensoñación & Fantasía</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Pinyon+Script&family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --dorado: #f8e4a1; 
            --rosa: #ffb7c5;   
            --oscuro: #0a0a0a;
            --font-magica: 'Pinyon Script', cursive;
            --font-serif: 'Cinzel', serif;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--oscuro);
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
        }

        /* --- FONDO: LIBRO MÁGICO --- */
        .portal-libro {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Ruta relativa directa para evitar errores de rama */
            background: url('./libro-magico.jpg') center/cover no-repeat;
            z-index: -1;
            filter: brightness(1.1);
            animation: openingBook 4s ease-out forwards;
        }

        /* Capa de luz para suavizar el contraste y asegurar legibilidad */
        .portal-libro::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, rgba(0,0,0,0.4) 100%);
            z-index: 0;
        }

        @keyframes openingBook {
            0% { transform: scale(1.1); filter: brightness(0.5) blur(10px); }
            100% { transform: scale(1); filter: brightness(1.1) blur(0px); }
        }

        /* --- CONTENIDO PRINCIPAL --- */
        .fairy-tale-hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .letras-magicas {
            font-family: var(--font-magica);
            font-size: clamp(3rem, 10vw, 6rem);
            color: var(--dorado);
            margin: 0;
            text-shadow: 0 0 20px rgba(255,183,197,0.5);
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.3);
            opacity: 0;
            transform: translateY(30px);
            animation: emerge 3s ease-out 1s forwards;
        }

        .sub-leyenda {
            font-family: var(--font-serif);
            letter-spacing: 8px;
            font-size: clamp(0.7rem, 2vw, 1rem);
            color: #fff;
            text-transform: uppercase;
            margin-top: 20px;
            opacity: 0;
            animation: fadeIn 2s ease-out 3s forwards;
        }

        @keyframes emerge {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            to { opacity: 0.8; }
        }

        /* --- BOTÓN WHATSAPP (ESTILO SELLO) --- */
        .wsp-sello {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, var(--dorado) 0%, var(--rosa) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: #000;
            text-decoration: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            border: 2px solid #fff;
            transition: transform 0.3s ease;
            z-index: 100;
        }

        .wsp-sello:hover {
            transform: scale(1.1) rotate(10deg);
        }

    </style>
</head>
<body>

    <div class="portal-libro"></div>

    <section class="fairy-tale-hero">
        <h1 class="letras-magicas">Hoy cumples 15 años...</h1>
        <p class="sub-leyenda">Ensoñación & Fantasía</p>
    </section>

    <a href="https://wa.me/51930046681" class="wsp-sello" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

</body>
</html>
