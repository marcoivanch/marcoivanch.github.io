<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Prueba de Imagen - Marco Iván Cabrera</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #000; /* Fondo negro para contraste */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* Ajusta la imagen sin deformarla */
            border: 5px solid #333; /* Un marco para saber dónde está la imagen */
        }
    </style>
</head>
<body>

    <img src="./libro-magico.jpg" alt="Si ves este texto, el archivo no se encuentra en la carpeta">

</body>
</html>
