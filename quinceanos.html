<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quinceaños | Ensoñación & Fantasía</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Pinyon+Script&family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --dorado: #f8e4a1; 
            --rosa: #ffb7c5;   
            --font-magica: 'Pinyon Script', cursive;
            --font-serif: 'Cinzel', serif;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: black; /* El luto inicial */
            height: 100%; width: 100%;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            display: flex; justify-content: center; align-items: center;
        }

        /* --- ESCENARIO DE LA FANTASÍA (ESTO APARECE SUAVEMENTE) --- */
        .escenario-quinceanos {
            position: relative;
            width: 100%; height: 100%;
            opacity: 0; /* Empieza invisible */
            animation: aparicionSuave 3s ease-out 0.5s forwards; /* Aparece todo suavemente */
        }

        /* LA FOTO DEL LIBRO (SUJETO REAL SUPERPUESTO) */
        .foto-libro {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            /* Ruta Relativa Directa a tu archivo JPG */
            background-image: url('./libro-magico.jpg'); 
            background-size: cover;
            background-position: center;
            z-index: 1; /* Detrás de los textos */
            filter: brightness(1.2) contrast(1.1); /* Brillo para que destaque */
        }

        /* Capa de luz para blindar el brillo cinematográfico */
        .foto-libro::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, rgba(0,0,0,0.3) 100%);
            z-index: 2;
        }

        /* --- LETRAS SUPERPUESTAS --- */
        .contenedor-textos {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10; /* En primer plano */
            text-align: center;
            width: 90%;
        }

        .letras-magicas {
            font-family: var(--font-magica);
            font-size: clamp(3rem, 12vw, 7rem);
            color: var(--dorado);
            margin: 0;
            text-shadow: 0 0 20px rgba(255,183,197,0.7);
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.2);
            opacity: 0;
            transform: translateY(20px);
            animation: emerge 1.5s ease-out 1.5s forwards; /* Aparecen después */
        }

        .sub-leyenda {
            font-family: var(--font-serif);
            letter-spacing: 8px;
            font-size: clamp(0.7rem, 2vw, 1.2rem);
            color: white;
            margin-top: 15px;
            opacity: 0;
            animation: fadeIn 2s ease-out 3s forwards; /* Aparece al final */
        }

        /* --- WHATSAPP SELLO --- */
        .wsp-sello {
            position: fixed; bottom: 30px; right: 30px;
            width: 60px; height: 60px;
            background: radial-gradient(circle, var(--dorado) 0%, var(--rosa) 100%);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; color: black; text-decoration: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            border: 2px solid white; z-index: 100;
        }

        /* --- ANIMACIONES --- */
        @keyframes aparicionSuave {
            to { opacity: 1; }
        }

        @keyframes emerge {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

    </style>
</head>
<body>

    <div class="escenario-quinceanos">
        
        <div class="foto-libro"></div>
        
        <div class="contenedor-textos">
            <h1 class="letras-magicas">Hoy cumples 15 años...</h1>
            <p class="sub-leyenda">Ensoñación & Fantasía</p>
        </div>

    </div>

    <a href="https://wa.me/51930046681" class="wsp-sello" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

</body>
</html>
