<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación Quince Años - Todo Perfecto</title>
    <style>
        /* Estilos base para ocupar toda la pantalla */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Evita barras de desplazamiento */
            font-family: 'Times New Roman', Times, serif; /* Fuente elegante por defecto */
        }

        /* Contenedor principal con la imagen de fondo elegante (sin círculos) */
        .main-container {
            position: relative;
            width: 100%;
            height: 100%;
            /* REEMPLAZA ESTA IMAGEN CON TU FONDO ELEGANTE SIN CÍRCULOS */
            background-image: url('fondo-quince-elegante.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* --- Estilos para los Textos Principales --- */
        
        .encabezado-textos {
            position: absolute;
            top: 15%; /* Posición similar a la original */
            width: 100%;
            text-align: center;
            color: #f8e1a1; /* Dorado lujoso */
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7); /* Sombra para legibilidad */
        }

        .titulo-script {
            font-family: 'Cursive', 'Pinyon Script', cursive; /* Fuente manuscrita elegante */
            font-size: 3.5vw; /* Tamaño adaptable a la pantalla */
            margin: 0;
        }

        .subtitulo-serif {
            font-family: 'Playfair Display', serif; /* Fuente serif sofisticada */
            font-size: 1.8vw;
            margin-top: 10px;
            letter-spacing: 2px;
        }

        /* --- Estilos para los Enlaces Inferiores (Sustitutos de los círculos) --- */

        .menu-enlaces-container {
            position: absolute;
            bottom: 12%; /* Justo encima del libro abierto */
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 5vw; /* Espacio entre los enlaces */
        }

        .enlace-item {
            text-decoration: none; /* Quitar subrayado */
            color: #fff; /* Color base blanco */
            text-align: center;
            cursor: pointer; /* Cambiar cursor a mano al pasar */
            transition: transform 0.3s ease, color 0.3s ease; /* Animación suave */
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.4); /* Fondo negro sutil para destacar */
            border-radius: 8px; /* Bordes suaves */
            backdrop-filter: blur(2px); /* Efecto de cristal esmerilado */
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); /* Sombra elegante */
        }

        /* Efecto al pasar el mouse (para computadoras) y al tocar (para móviles) */
        .enlace-item:hover, .enlace-item:active {
            transform: scale(1.1); /* Agranda un poco */
            color: #f8e1a1; /* Cambia a dorado */
            box-shadow: 0 6px 12px rgba(248, 225, 161, 0.5); /* Brillo dorado */
        }

        .texto-enlace {
            font-family: 'Montserrat', sans-serif; /* Fuente moderna y limpia */
            text-transform: uppercase; /* Todo en mayúsculas */
            letter-spacing: 3px;
            font-size: 1.2vw;
            font-weight: 700;
        }

        /* Símbolo decorativo sutil debajo del texto */
        .decoracion-enlace {
            display: block;
            font-size: 1.5vw;
            margin-top: -5px;
            color: rgba(255, 255, 255, 0.5);
        }

        .enlace-item:hover .decoracion-enlace {
            color: #f8e1a1;
        }

        /* --- Media Queries para Adaptabilidad en Móviles --- */
        @media (max-width: 768px) {
            .titulo-script { font-size: 8vw; }
            .subtitulo-serif { font-size: 4vw; }
            .menu-enlaces-container {
                bottom: 8%;
                flex-direction: column;
                gap: 15px;
                align-items: center;
            }
            .enlace-item { width: 60%; }
            .texto-enlace { font-size: 4vw; }
            .decoracion-enlace { font-size: 5vw; }
        }
    </style>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=Pinyon+Script&family=Montserrat:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="main-container">
        
        <div class="encabezado-textos">
            <h1 class="titulo-script">Ya cumples tus Quince Años...</h1>
            <p class="subtitulo-serif">Todo debe salir perfecto...</p>
        </div>

        <div class="menu-enlaces-container">
            
            <a href="planificacion.html" class="enlace-item">
                <span class="texto-enlace">Planificación</span>
                <span class="decoracion-enlace">✧</span> </a>

            <a href="opciones.html" class="enlace-item">
                <span class="texto-enlace">Opciones</span>
                <span class="decoracion-enlace">✧</span>
            </a>

            <a href="protocolo.html" class="enlace-item">
                <span class="texto-enlace">Protocolo</span>
                <span class="decoracion-enlace">✧</span>
            </a>

        </div>

    </div>

</body>
</html>
