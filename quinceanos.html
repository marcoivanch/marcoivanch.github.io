<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quinceaños | Protocolo y Planificación</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Pinyon+Script&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --dorado-brillante: #f8e4a1;
            --dorado-mate: #c5a059;
            --sombra-naranja: rgba(204, 88, 3, 0.8);
            --oscuro: #0a0a0a;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: black;
            height: 100%; width: 100%;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
        }

        /* --- ESCENARIO VISUAL --- */
        .escenario-quinceanos {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('./libro-magico.jpg') center/cover no-repeat;
            z-index: 1;
            filter: brightness(1.1) contrast(1.05);
            animation: fadeInScreen 3s ease-out forwards;
        }

        .escenario-quinceanos::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.5));
            z-index: 2;
        }

        /* --- TEXTOS PRINCIPALES --- */
        .interfaz-usuario {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 60px 20px;
            box-sizing: border-box;
        }

        .cabecera {
            text-align: left;
            width: 85%;
            max-width: 1200px;
        }

        .titulo-principal {
            font-family: 'Pinyon Script', cursive;
            font-size: clamp(3.5rem, 10vw, 6.5rem);
            color: var(--dorado-brillante);
            margin: 0;
            text-shadow: 3px 3px 15px var(--sombra-naranja);
            opacity: 0;
            transform: translateY(-20px);
            animation: emerge 2s ease-out 0.5s forwards;
            padding-left: 0;
        }

        .linea-perfeccion {
            font-family: 'Cinzel', serif;
            color: white;
            letter-spacing: 6px;
            font-size: clamp(0.8rem, 2vw, 1.2rem);
            margin-top: 5px;
            opacity: 0;
            margin-left: 1.5vw; 
            text-transform: uppercase;
            animation: fadeIn 2s ease-out 2s forwards;
        }

        /* --- BOTONES DE NAVEGACIÓN --- */
        .menu-navegacion {
            display: flex;
            gap: 30px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        .boton-quince {
            text-decoration: none;
            font-family: 'Cinzel', serif;
            color: var(--dorado-brillante);
            border: 1px solid var(--dorado-mate);
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 35px;
            letter-spacing: 3px;
            font-size: 0.9rem;
            text-transform: uppercase;
            transition: all 0.4s ease;
            backdrop-filter: blur(5px);
            opacity: 0;
            animation: fadeIn 2s ease-out 3s forwards;
        }

        .boton-quince:hover {
            background: var(--dorado-mate);
            color: black;
            box-shadow: 0 0 20px var(--dorado-brillante);
            transform: translateY(-5px);
        }

        /* --- ANIMACIONES --- */
        @keyframes fadeInScreen { from { opacity: 0; } to { opacity: 1; } }
        @keyframes emerge { to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { to { opacity: 1; } }

        @media (max-width: 600px) {
            .cabecera { text-align: center; width: 100%; }
            .linea-perfeccion { margin-left: 0; text-align: center; }
            .menu-navegacion { flex-direction: column; align-items: center; gap: 15px; }
            .boton-quince { width: 80%; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="escenario-quinceanos"></div>

    <main class="interfaz-usuario">
        
        <div class="cabecera">
            <h1 class="titulo-principal">"Ya cumples tus Quince Años..."</h1>
            <p class="linea-perfeccion">Todo debe salir perfecto</p>
        </div>

        <nav class="menu-navegacion">
            <a href="planificacion.html" class="boton-quince">Planificación</a>
            <a href="opciones.html" class="boton-quince">Opciones</a>
            <a href="protocolo.html" class="boton-quince">Protocolo</a>
        </nav>

    </main>

    <a href="https://wa.me/51930046681" style="position: fixed; bottom: 30px; right: 30px; z-index: 100; color: #f8e4a1; font-size: 40px; text-decoration: none;">
        <i class="fab fa-whatsapp"></i>
    </a>

</body>
</html>
