<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Esposos – Maestro de Ceremonias</title>

<style>
/* ------------------ BASE ------------------ */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: "Times New Roman", serif;
  background: url("Fondo nupcial .png") no-repeat center top;
  background-size: cover;
  background-attachment: fixed;
  color: #3a2b1a;
}

/* ------------------ ENCABEZADO ------------------ */
.header {
  width: 100%;
  padding: 22px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.header-left img {
  height: 70px;
}

.header-title {
  color: #3a2b1a;
  text-shadow: 0 0 6px rgba(255,255,255,0.6);
  font-size: 1.7rem;
  line-height: 1.2;
}

.header-title span {
  display: block;
  font-size: 1rem;
  margin-top: 4px;
}

/* ------------------ MENÚ SUPERIOR ------------------ */
.nav {
  display: flex;
  gap: 24px;
}

.nav a {
  color: #3a2b1a;
  text-decoration: none;
  font-size: 1rem;
  letter-spacing: 0.05em;
  padding: 4px 8px;
  font-weight: bold;
}

.nav a:hover {
  opacity: 0.7;
}

/* ------------------ MENÚ HAMBURGUESA ------------------ */
.hamburger {
  display: none;
  font-size: 30px;
  color: #3a2b1a;
  cursor: pointer;
}

.side-menu {
  position: fixed;
  top: 0;
  right: -70%;
  width: 70%;
  height: 100%;
  background: rgba(255,255,255,0.95);
  padding: 30px 24px;
  transition: right 0.4s ease;
  z-index: 999;
}

.side-menu.open {
  right: 0;
}

.side-menu a {
  display: block;
  color: #3a2b1a;
  text-decoration: none;
  font-size: 1.1rem;
  margin-bottom: 18px;
  font-weight: bold;
}

.close-menu {
  font-size: 30px;
  color: #3a2b1a;
  text-align: right;
  cursor: pointer;
  margin-bottom: 24px;
}

/* ------------------ RESPONSIVE ------------------ */
@media (max-width: 900px) {
  .nav { display: none; }
  .hamburger { display: block; }
}

/* ------------------ MURAL ------------------ */
.mural {
  position: relative;
  width: 100%;
  max-width: 1400px;
  margin: 60px auto 80px auto;
  min-height: 600px;
}

/* FOTO 1 – protagonista */
.foto1 {
  position: absolute;
  width: 420px; /* tamaño doble */
  height: 320px;
  left: 18%; /* NO centrada */
  top: -120px; /* para que caiga */
  border-radius: 14px;
  overflow: hidden;
  cursor: pointer;
  filter: grayscale(100%);
  transform: rotate(-2deg);
  box-shadow: 0 18px 40px rgba(0,0,0,0.4);
  animation: caer 1.2s ease forwards;
  transition: filter 0.5s ease, transform 0.5s ease, box-shadow 0.5s ease;
}

.foto1 img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Animación de caída */
@keyframes caer {
  0% { top: -180px; opacity: 0; }
  60% { top: 40px; opacity: 1; }
  80% { top: 20px; }
  100% { top: 30px; }
}

/* Hover cinematográfico */
.foto1:hover {
  filter: grayscale(0%);
  transform: rotate(-2deg) scale(1.05);
  box-shadow: 0 25px 55px rgba(0,0,0,0.6);
}

/* ------------------ OVERLAY PANTALLA COMPLETA ------------------ */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.88);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

.overlay-content {
  max-width: 1100px;
  width: 92%;
  max-height: 90vh;
  background: #111;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 25px 60px rgba(0,0,0,0.9);
  display: flex;
  flex-direction: column;
}

.overlay-img {
  width: 100%;
  max-height: 70vh;
  object-fit: cover;
}

.overlay-texto {
  padding: 18px 22px 20px 22px;
  color: #fff;
}

.overlay-texto h2 {
  color: #d4af37;
  margin-bottom: 6px;
  font-size: 1.3rem;
}

.overlay-texto p {
  font-size: 1rem;
}

.overlay-cerrar {
  position: absolute;
  top: 18px;
  right: 26px;
  font-size: 28px;
  color: #ffffff;
  cursor: pointer;
}

/* ------------------ PIE ------------------ */
.footer {
  margin-top: 40px;
  padding: 30px 0;
  text-align: center;
  color: #3a2b1a;
  font-size: 0.9rem;
  text-shadow: 0 0 6px rgba(255,255,255,0.6);
}
</style>
</head>

<body>

<!-- ENCABEZADO -->
<header class="header">
  <div class="header-left">
    <img src="Logotipo MICH dorado.png" alt="Logo MICH">
    <div class="header-title">
      MARCO IVÁN CABRERA
      <span>MAESTRO DE CEREMONIAS</span>
    </div>
  </div>

  <nav class="nav">
    <a href="index.html">Inicio</a>
    <a href="opciones.html">Opciones</a>
    <a href="disponibilidad.html">Disponibilidad</a>
  </nav>

  <div class="hamburger" id="hamburger">&#9776;</div>
</header>

<!-- MENÚ LATERAL -->
<div class="side-menu" id="sideMenu">
  <div class="close-menu" id="closeMenu">&times;</div>
  <a href="index.html">Inicio</a>
  <a href="opciones.html">Opciones</a>
  <a href="disponibilidad.html">Disponibilidad</a>
</div>

<!-- MURAL -->
<main class="mural">

  <!-- FOTO 1 -->
  <div class="foto1" id="foto1">
    <img src="Esposos llegando.png" alt="Llegada de los esposos">
  </div>

</main>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
  <div class="overlay-cerrar" id="cerrarOverlay">&times;</div>
  <div class="overlay-content">
    <img src="Esposos llegando.png" alt="Llegada de los esposos" class="overlay-img">
    <div class="overlay-texto">
      <h2>Llegada de los esposos</h2>
      <p>El primer anuncio del Maestro de Ceremonias será la llegada de los recién casados.</p>
    </div>
  </div>
</div>

<!-- PIE -->
<footer class="footer">
  Marco Iván Cabrera © Derechos Reservados 2026
</footer>

<script>
// Menú hamburguesa
const hamburger = document.getElementById("hamburger");
const sideMenu = document.getElementById("sideMenu");
const closeMenu = document.getElementById("closeMenu");

hamburger.onclick = () => sideMenu.classList.add("open");
closeMenu.onclick = () => sideMenu.classList.remove("open");

// Foto 1 → pantalla completa
const foto1 = document.getElementById("foto1");
const overlay = document.getElementById("overlay");
const cerrarOverlay = document.getElementById("cerrarOverlay");

foto1.onclick = () => overlay.style.display = "flex";
cerrarOverlay.onclick = () => overlay.style.display = "none";

overlay.onclick = (e) => {
  if (e.target === overlay) overlay.style.display = "none";
};
</script>

</body>
</html>
