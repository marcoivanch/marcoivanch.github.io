<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Esposos – Maestro de Ceremonias</title>

<style>

body {
  margin: 0;
  padding: 0;
  font-family: "Times New Roman", serif;
  background: url("Fondo nupcial .png") no-repeat center top;
  background-size: cover;
  background-attachment: fixed;
  color: #fff;
}

/* ----------------------------- */
/* ENCABEZADO INSTITUCIONAL      */
/* ----------------------------- */

.header {
  width: 100%;
  padding: 25px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 18px;
}

.header-left img {
  height: 70px;
}

.header-title {
  color: #d4af37;
  font-size: 1.8rem;
  line-height: 1.2;
  text-shadow: 0 0 8px rgba(0,0,0,0.7);
}

.header-title span {
  display: block;
  font-size: 1rem;
  margin-top: 4px;
}

/* ----------------------------- */
/* MENÚ CONTEXTUAL               */
/* ----------------------------- */

.nav {
  display: flex;
  gap: 25px;
}

.nav a {
  color: #d4af37;
  text-decoration: none;
  font-size: 1rem;
  letter-spacing: 0.04em;
  padding: 6px 10px;
}

.nav a:hover {
  color: #fff;
}

/* ----------------------------- */
/* MENÚ HAMBURGUESA              */
/* ----------------------------- */

.hamburger {
  display: none;
  font-size: 32px;
  color: #d4af37;
  cursor: pointer;
}

.side-menu {
  position: fixed;
  top: 0;
  right: -60%;
  width: 60%;
  height: 100%;
  background: #000;
  padding: 40px 30px;
  transition: 0.4s ease;
  z-index: 999;
}

.side-menu.open {
  right: 0;
}

.side-menu a {
  display: block;
  color: #d4af37;
  text-decoration: none;
  font-size: 1.2rem;
  margin-bottom: 20px;
}

.close-menu {
  font-size: 32px;
  color: #d4af37;
  cursor: pointer;
  text-align: right;
  margin-bottom: 30px;
}

/* ----------------------------- */
/* RESPONSIVE                    */
/* ----------------------------- */

@media (max-width: 900px) {
  .nav { display: none; }
  .hamburger { display: block; }
  .side-menu { width: 75%; right: -75%; }
}

/* ----------------------------- */
/* MURAL DE FOTOS                */
/* ----------------------------- */

.gallery-wrapper {
  position: relative;
  width: 100%;
  height: 760px;
  margin-top: 40px;
}

.gallery-photo {
  position: absolute;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
  transition: transform 0.4s ease, filter 0.4s ease;
}

.gallery-photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* FOTO 1 — reemplazada por Esposos llegando.png */
.gallery-photo:nth-child(1) {
  width: 260px;
  height: 200px;
  top: 0;
  left: 22%;
  transform: translateY(-80px) rotate(-2deg);
  filter: grayscale(100%);
}

.gallery-photo:nth-child(1):hover {
  filter: none;
  transform: translateY(0) rotate(-2deg);
}

/* FOTO 2 */
.gallery-photo:nth-child(2) {
  width: 240px;
  height: 180px;
  top: 20px;
  left: 48%;
  transform: translateY(-80px) rotate(1.5deg);
  filter: sepia(60%);
}

/* FOTO 3 */
.gallery-photo:nth-child(3) {
  width: 200px;
  height: 200px;
  top: 0;
  left: 68%;
  transform: translateY(-80px) rotate(-1deg);
}

/* FOTO 4 */
.gallery-photo:nth-child(4) {
  width: 260px;
  height: 200px;
  top: 210px;
  left: 12%;
  transform: translateY(-80px) rotate(2deg);
  filter: blur(1px);
}

/* FOTO 5 */
.gallery-photo:nth-child(5) {
  width: 230px;
  height: 230px;
  top: 220px;
  left: 42%;
  transform: translateY(-80px) rotate(-1.5deg);
}

/* FOTO 6 */
.gallery-photo:nth-child(6) {
  width: 260px;
  height: 190px;
  top: 210px;
  right: 10%;
  transform: translateY(-80px) rotate(1deg);
  filter: sepia(40%);
}

/* FOTO 7 */
.gallery-photo:nth-child(7) {
  width: 220px;
  height: 180px;
  bottom: 40px;
  left: 6%;
  transform: translateY(-80px) rotate(-2deg);
}

/* FOTO 8 */
.gallery-photo:nth-child(8) {
  width: 260px;
  height: 210px;
  bottom: 10px;
  left: 34%;
  transform: translateY(-80px) rotate(1deg);
  filter: grayscale(70%);
}

/* FOTO 9 */
.gallery-photo:nth-child(9) {
  width: 230px;
  height: 190px;
  bottom: 30px;
  right: 8%;
  transform: translateY(-80px) rotate(-1deg);
}

/* ----------------------------- */
/* LIGHTBOX                      */
/* ----------------------------- */

.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.lightbox-content {
  max-width: 900px;
  width: 90%;
  max-height: 90vh;
  background: #111;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 20px 50px rgba(0,0,0,0.7);
  display: flex;
  flex-direction: column;
}

.lightbox-img {
  width: 100%;
  max-height: 70vh;
  object-fit: cover;
}

.lightbox-info {
  padding: 15px 20px;
}

.lightbox-info h2 {
  color: #d4af37;
  margin-bottom: 6px;
}

.lightbox-buttons button {
  background: #b08a3c;
  border: none;
  color: #fff;
  padding: 8px 14px;
  border-radius: 20px;
  cursor: pointer;
}

.lightbox-close {
  position: absolute;
  top: 18px;
  right: 24px;
  font-size: 26px;
  color: #fff;
  cursor: pointer;
}

/* ----------------------------- */
/* PIE INSTITUCIONAL             */
/* ----------------------------- */

.footer {
  margin-top: 80px;
  padding: 40px 0;
  text-align: center;
  color: #d4af37;
  font-size: 0.9rem;
}

</style>
</head>

<body>

<!-- ENCABEZADO -->
<div class="header">

  <div class="header-left">
    <img src="img/Logotipo MICH dorado.png" alt="Logo MICH">
    <div class="header-title">
      MARCO IVÁN CABRERA
      <span>MAESTRO DE CEREMONIAS</span>
    </div>
  </div>

  <div class="nav">
    <a href="index.html">Inicio</a>
    <a href="opciones.html">Opciones</a>
    <a href="disponibilidad.html">Disponibilidad</a>
    <a href="contacto.html">Contacto</a>
  </div>

  <div class="hamburger" id="hamburger">&#9776;</div>

</div>

<!-- MENÚ LATERAL -->
<div class="side-menu" id="sideMenu">
  <div class="close-menu" id="closeMenu">&times;</div>
  <a href="index.html">Inicio</a>
  <a href="opciones.html">Opciones</a>
  <a href="disponibilidad.html">Disponibilidad</a>
  <a href="contacto.html">Contacto</a>
</div>

<!-- MURAL -->
<div class="gallery-wrapper">

  <div class="gallery-photo" data-title="Llegada de los esposos" data-desc="El primer anuncio del Maestro de Ceremonias será la llegada de los recién casados.">
    <img src="Esposos llegando.png" alt="Llegada de los esposos">
  </div>

  <div class="gallery-photo" data-title="Boda 2" data-desc="Intercambio de anillos, momento central.">
    <img src="img/matrimonio2.jpg" alt="Boda 2">
  </div>

  <div class="gallery-photo" data-title="Boda 3" data-desc="Retrato editorial de los esposos.">
    <img src="img/matrimonio3.jpg" alt="Boda 3">
  </div>

  <div class="gallery-photo" data-title="Boda 4" data-desc="Detalle de manos, promesa y alianza.">
    <img src="img/matrimonio4.jpg" alt="Boda 4">
  </div>

  <div class="gallery-photo" data-title="Boda 5" data-desc="Salida triunfal, pétalos y aplausos.">
    <img src="img/matrimonio5.jpg" alt="Boda 5">
  </div>

  <div class="gallery-photo" data-title="Boda 6" data-desc="Primer baile como esposos.">
    <img src="img/matrimonio6.jpg" alt="Boda 6">
  </div>

  <div class="gallery-photo" data-title="Boda 7" data-desc="Brindis y celebración con la familia.">
    <img src="img/matrimonio7.jpg" alt="Boda 7">
  </div>

  <div class="gallery-photo" data-title="Boda 8" data-desc="Retrato artístico con bouquet.">
    <img src="img/matrimonio8.jpg" alt="Boda 8">
  </div>

  <div class="gallery-photo" data-title="Boda 9" data-desc="Momento final, despedida de gala.">
    <img src="img/matrimonio9.jpg" alt="Boda 9">
  </div>

</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <div class="lightbox-close" id="lightboxClose">&times;</div>
  <div class="lightbox-content">
    <img src="" alt="" class="lightbox-img" id="lightboxImg">
    <div class="lightbox-info">
      <h2 id="lightboxTitle"></h2>
      <p id="lightboxDesc"></p>
      <div class="lightbox-buttons">
        <button type="button" id="backToMural">Volver al mural</button>
        <button type="button">Consultar disponibilidad</button>
      </div>
    </div>
  </div>
</div>

<!-- PIE -->
<div class="footer">
  Marco Iván Cabrera © Derechos Reservados 2026
</div>

<script>

const hamburger = document.getElementById("hamburger");
const sideMenu = document.getElementById("sideMenu");
const closeMenu = document.getElementById("closeMenu");

hamburger.onclick = () => sideMenu.classList.add("open");
closeMenu.onclick = () => sideMenu.classList.remove("open");

const photos = document.querySelectorAll(".gallery-photo");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightboxImg");
const lightboxTitle = document.getElementById("lightboxTitle");
const lightboxDesc = document.getElementById("lightboxDesc");
const lightboxClose = document.getElementById("lightboxClose");
const backToMural = document.getElementById("backToMural");

photos.forEach(photo => {
  photo.addEventListener("click", () => {
    const img = photo.querySelector("img");
    lightboxImg.src = img.src;
    lightboxTitle.textContent = photo.getAttribute("data-title");
    lightboxDesc.textContent = photo.getAttribute("data-desc");
    lightbox.style.display = "flex";
  });
});

lightboxClose.onclick = () => lightbox.style.display = "none";
backToMural.onclick = () => lightbox.style.display = "none";

lightbox.onclick = (e) => {
  if (e.target === lightbox) lightbox.style.display = "none";
};

</script>

</body>
</html>
