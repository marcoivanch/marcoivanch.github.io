<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Esposos – Maestro de Ceremonias</title>

<style>
/* ------------------ BASE ------------------ */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: "Times New Roman", serif;
  background: url("Fondo nupcial .png") no-repeat center top;
  background-size: cover;
  background-attachment: fixed;
  color: #fff;
}

/* ------------------ ENCABEZADO ------------------ */
.header {
  width: 100%;
  padding: 20px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.header-left img {
  height: 70px;
}

.header-title {
  color: #d4af37;
  text-shadow: 0 0 8px rgba(0,0,0,0.7);
  font-size: 1.7rem;
  line-height: 1.2;
}

.header-title span {
  display: block;
  font-size: 1rem;
  margin-top: 4px;
}

/* ------------------ MENÚ SUPERIOR ------------------ */
.nav {
  display: flex;
  gap: 24px;
}

.nav a {
  color: #d4af37;
  text-decoration: none;
  font-size: 1rem;
  letter-spacing: 0.05em;
  padding: 4px 8px;
}

.nav a:hover {
  color: #ffffff;
}

/* ------------------ MENÚ HAMBURGUESA ------------------ */
.hamburger {
  display: none;
  font-size: 30px;
  color: #d4af37;
  cursor: pointer;
}

.side-menu {
  position: fixed;
  top: 0;
  right: -70%;
  width: 70%;
  height: 100%;
  background: #000;
  padding: 30px 24px;
  transition: right 0.4s ease;
  z-index: 999;
}

.side-menu.open {
  right: 0;
}

.side-menu a {
  display: block;
  color: #d4af37;
  text-decoration: none;
  font-size: 1.1rem;
  margin-bottom: 18px;
}

.close-menu {
  font-size: 30px;
  color: #d4af37;
  text-align: right;
  cursor: pointer;
  margin-bottom: 24px;
}

/* ------------------ RESPONSIVE ------------------ */
@media (max-width: 900px) {
  .nav { display: none; }
  .hamburger { display: block; }
}

/* ------------------ ZONA MURAL ------------------ */
.mural {
  position: relative;
  width: 100%;
  max-width: 1200px;
  margin: 60px auto 80px auto;
  min-height: 500px;
}

/* FOTO 1 – pieza principal */
.foto1 {
  position: absolute;
  width: 260px;
  height: 200px;
  left: 50%;
  top: 40px;
  transform: translateX(-50%);
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  box-shadow: 0 12px 30px rgba(0,0,0,0.6);
  filter: grayscale(100%);
  transition: filter 0.5s ease, transform 0.5s ease, box-shadow 0.5s ease;
}

.foto1 img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Hover: color + sensación de acercamiento */
.foto1:hover {
  filter: grayscale(0%);
  transform: translateX(-50%) translateY(-6px) scale(1.02);
  box-shadow: 0 18px 40px rgba(0,0,0,0.8);
}

/* ------------------ OVERLAY PANTALLA COMPLETA FOTO 1 ------------------ */
.overlay-foto1 {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.88);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

.overlay-foto1-content {
  max-width: 1100px;
  width: 92%;
  max-height: 90vh;
  background: #111;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 25px 60px rgba(0,0,0,0.9);
  display: flex;
  flex-direction: column;
}

.overlay-foto1-img {
  width: 100%;
  max-height: 70vh;
  object-fit: cover;
}

.overlay-foto1-texto {
  padding: 18px 22px 20px 22px;
}

.overlay-foto1-texto h2 {
  color: #d4af37;
  margin-bottom: 6px;
  font-size: 1.3rem;
}

.overlay-foto1-texto p {
  font-size: 1rem;
}

.overlay-foto1-cerrar {
  position: absolute;
  top: 18px;
  right: 26px;
  font-size: 28px;
  color: #ffffff;
  cursor: pointer;
}

/* ------------------ PLACEHOLDERS OTRAS FOTOS (solo movimiento) ------------------ */
.foto-placeholder {
  position: absolute;
  width: 180px;
  height: 140px;
  border-radius: 10px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(3px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  animation: subirSuave 1.4s ease forwards;
  opacity: 0;
}

/* posiciones aproximadas solo para ver movimiento */
.foto2 { top: 260px; left: 12%; animation-delay: 0.1s; }
.foto3 { top: 220px; left: 38%; animation-delay: 0.2s; }
.foto4 { top: 260px; right: 12%; animation-delay: 0.3s; }
.foto5 { top: 430px; left: 20%; animation-delay: 0.4s; }
.foto6 { top: 430px; right: 20%; animation-delay: 0.5s; }

/* Animación de entrada */
@keyframes subirSuave {
  from {
    transform: translateY(40px);
    opacity: 0;
  }
  to {
    transform: translateY(0);
    opacity: 1;
  }
}

/* ------------------ PIE ------------------ */
.footer {
  margin-top: 40px;
  padding: 30px 0;
  text-align: center;
  color: #d4af37;
  font-size: 0.9rem;
  text-shadow: 0 0 6px rgba(0,0,0,0.7);
}
</style>
</head>

<body>

<!-- ENCABEZADO -->
<header class="header">
  <div class="header-left">
    <img src="Logotipo MICH dorado.png" alt="Logo MICH">
    <div class="header-title">
      MARCO IVÁN CABRERA
      <span>MAESTRO DE CEREMONIAS</span>
    </div>
  </div>

  <nav class="nav">
    <a href="index.html">Inicio</a>
    <a href="opciones.html">Opciones</a>
    <a href="disponibilidad.html">Disponibilidad</a>
  </nav>

  <div class="hamburger" id="hamburger">&#9776;</div>
</header>

<!-- MENÚ LATERAL -->
<div class="side-menu" id="sideMenu">
  <div class="close-menu" id="closeMenu">&times;</div>
  <a href="index.html">Inicio</a>
  <a href="opciones.html">Opciones</a>
  <a href="disponibilidad.html">Disponibilidad</a>
</div>

<!-- MURAL (solo nos importa Foto 1 por ahora) -->
<main class="mural">

  <!-- FOTO 1: B/N → color + overlay pantalla completa -->
  <div class="foto1" id="foto1">
    <img src="Esposos llegando.png" alt="Llegada de los esposos">
  </div>

  <!-- Placeholders solo para ver movimiento (sin imágenes aún) -->
  <div class="foto-placeholder foto2"></div>
  <div class="foto-placeholder foto3"></div>
  <div class="foto-placeholder foto4"></div>
  <div class="foto-placeholder foto5"></div>
  <div class="foto-placeholder foto6"></div>

</main>

<!-- OVERLAY PANTALLA COMPLETA FOTO 1 -->
<div class="overlay-foto1" id="overlayFoto1">
  <div class="overlay-foto1-cerrar" id="cerrarOverlay">&times;</div>
  <div class="overlay-foto1-content">
    <img src="Esposos llegando.png" alt="Llegada de los esposos" class="overlay-foto1-img">
    <div class="overlay-foto1-texto">
      <h2>Llegada de los esposos</h2>
      <p>El primer anuncio del Maestro de Ceremonias será la llegada de los recién casados.</p>
    </div>
  </div>
</div>

<!-- PIE -->
<footer class="footer">
  Marco Iván Cabrera © Derechos Reservados 2026
</footer>

<script>
// Menú hamburguesa
const hamburger = document.getElementById("hamburger");
const sideMenu = document.getElementById("sideMenu");
const closeMenu = document.getElementById("closeMenu");

if (hamburger) {
  hamburger.onclick = () => sideMenu.classList.add("open");
}
if (closeMenu) {
  closeMenu.onclick = () => sideMenu.classList.remove("open");
}

// Foto 1: abrir overlay a pantalla completa
const foto1 = document.getElementById("foto1");
const overlayFoto1 = document.getElementById("overlayFoto1");
const cerrarOverlay = document.getElementById("cerrarOverlay");

if (foto1 && overlayFoto1) {
  foto1.addEventListener("click", () => {
    overlayFoto1.style.display = "flex";
  });
}

if (cerrarOverlay && overlayFoto1) {
  cerrarOverlay.addEventListener("click", () => {
    overlayFoto1.style.display = "none";
  });
}

// Cerrar overlay al hacer clic fuera del contenido
if (overlayFoto1) {
  overlayFoto1.addEventListener("click", (e) => {
    if (e.target === overlayFoto1) {
      overlayFoto1.style.display = "none";
    }
  });
}
</script>

</body>
</html>
