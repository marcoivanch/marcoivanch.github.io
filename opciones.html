<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Opciones | Quinceaños</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Pinyon+Script&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --dorado: #f8e4a1;
            --dorado-mate: #c5a059;
            --fondo-oscuro: #0a0705;
            --vino-tinto: #660000;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: black;
            height: 100%; width: 100%;
            overflow-x: hidden;
            font-family: 'Montserrat', sans-serif;
            color: white;
        }

        /* --- MENÚ HAMBURGUESA --- */
        .menu-hamburguesa {
            position: fixed;
            top: 25px;
            right: 25px;
            z-index: 110;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px;
            border-radius: 4px;
            border: 1px solid rgba(197, 160, 89, 0.3);
            display: flex;
            flex-direction: column;
            gap: 6px;
            transition: 0.3s;
        }
        .menu-hamburguesa:hover { border-color: var(--dorado); }

        .linea {
            width: 28px;
            height: 2px;
            background-color: var(--dorado-mate);
            transition: 0.4s;
            transform-origin: left center;
        }

        .menu-hamburguesa.open .linea:nth-child(1) { transform: rotate(45deg); background-color: var(--dorado); }
        .menu-hamburguesa.open .linea:nth-child(2) { opacity: 0; }
        .menu-hamburguesa.open .linea:nth-child(3) { transform: rotate(-45deg); background-color: var(--dorado); }

        .nav-panel {
            position: fixed;
            top: 0;
            right: -100%;
            width: 320px;
            height: 100vh;
            background: rgba(10, 7, 5, 0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding: 0 40px;
            transition: 0.5s cubic-bezier(0.77,0.2,0.05,1.0);
            border-left: 1px solid rgba(197, 160, 89, 0.2);
        }
        .nav-panel.active { right: 0; }

        .nav-panel a {
            font-family: 'Cinzel', serif;
            color: rgba(248, 228, 161, 0.7);
            text-decoration: none;
            font-size: 1.2rem;
            margin: 15px 0;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: 0.3s;
            position: relative;
            padding-left: 15px;
        }
        .nav-panel a:hover { color: var(--dorado); }

        /* --- FONDO ESCÉNICO --- */
        .bg-opciones {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('./fondo-opciones.jpg') center/cover no-repeat;
            z-index: 1;
            filter: brightness(0.6) contrast(1.1);
        }

        .capa-gradiente {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right,
                var(--fondo-oscuro) 0%,
                var(--fondo-oscuro) 40%,
                rgba(10, 7, 5, 0.2) 80%,
                transparent 100%);
            z-index: 2;
        }

        /* --- CONTENIDO --- */
        .contenido {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            padding: 0 5% 0 8%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .titulo-emocional {
            font-family: 'Cinzel', serif;
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            color: var(--dorado);
            margin-bottom: 25px;
            line-height: 1.3;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .bloque-opcion {
            margin-bottom: 60px;
        }

        .foto-opcion {
            width: 100%;
            height: 320px;
            background: #222;
            border: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 20px;
            background-size: cover;
            background-position: center;
        }

        .narrativa {
            font-family: 'Montserrat', sans-serif;
            line-height: 1.9;
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.05rem;
            font-weight: 300;
        }

        .btn-regresar {
            font-family: 'Cinzel', serif;
            color: var(--dorado-mate);
            text-decoration: none;
            padding: 12px 30px;
            border: 1px solid var(--dorado-mate);
            background: rgba(0,0,0,0.5);
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: 0.3s;
            backdrop-filter: blur(5px);
            align-self: flex-start;
            margin-top: 40px;
        }

        .btn-regresar:hover {
            background: var(--dorado-mate);
            color: black;
        }

        .wsp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background-color: var(--vino-tinto);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 2px 2px 15px rgba(0,0,0,0.5);
            text-decoration: none;
            z-index: 90;
            transition: 0.3s;
        }
        .wsp-float:hover { transform: scale(1.1); background-color: #800000; }

    </style>
</head>
<body>

    <div class="menu-hamburguesa" onclick="toggleMenu()" id="hamburguesa">
        <div class="linea"></div>
        <div class="linea"></div>
        <div class="linea"></div>
    </div>

    <nav class="nav-panel" id="menuNav">
        <a href="index.html" onclick="toggleMenu()">Inicio</a>
        <a href="servicios.html" onclick="toggleMenu()">Servicios</a>
        <a href="disponibilidad.html" onclick="toggleMenu()">Disponibilidad</a>
        <a href="contacto.html" onclick="toggleMenu()">Contacto</a>
    </nav>

    <div class="bg-opciones"></div>
    <div class="capa-gradiente"></div>

    <main class="contenido">

        <h1 class="titulo-emocional">"Las opciones que harán tu noche inolvidable"</h1>

        <!-- BLOQUE 1 (Cadetes) -->
        <div class="bloque-opcion">
            <div class="foto-opcion" style="background-image:url('./foto-cadetes.jpg');"></div>
            <p class="narrativa">
                Texto provisional. Aquí irá tu párrafo literario final.
            </p>
        </div>

        <!-- BLOQUE 2 (Velas y rosas) -->
        <div class="bloque-opcion">
            <div class="foto-opcion" style="background-image:url('./foto-velas.jpg');"></div>
            <p class="narrativa">
                Texto provisional. Aquí irá el párrafo que acabamos de trabajar.
            </p>
        </div>

        <!-- Más bloques se agregarán cuando envíes las fotos -->

        <a href="quinceanos.html" class="btn-regresar">Regresar</a>

    </main>

    <a href="https://wa.me/51930046681" class="wsp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script>
        function toggleMenu() {
            const nav = document.getElementById("menuNav");
            const burguer = document.getElementById("hamburguesa");
            nav.classList.toggle("active");
            burguer.classList.toggle("open");
        }
    </script>

</body>
</html>
