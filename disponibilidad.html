<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disponibilidad | Marco Iván Cabrera Hernández</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Great+Vibes&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --dorado: #c5a059;
            --oscuro: #0f0f0f;
            --blanco-marfil: #fdfcfb;
            --whatsapp-verde: #25d366;
            --font-serif: 'Cinzel', serif;
            --font-cursive: 'Great Vibes', cursive;
            --font-sans: 'Montserrat', sans-serif;
        }

        body, html { margin: 0; padding: 0; min-height: 100%; background-color: var(--oscuro); font-family: var(--font-sans); color: var(--blanco-marfil); overflow-x: hidden; }

        header {
            position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center;
            padding: 25px 80px; box-sizing: border-box; z-index: 1000; background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(12px); border-bottom: 1px solid rgba(197, 160, 89, 0.2);
        }

        .logo { font-family: var(--font-serif); font-size: 1.2rem; letter-spacing: 3px; color: var(--dorado); text-transform: uppercase; text-decoration: none; }
        .nav-menu { display: flex; gap: 40px; }
        .nav-menu a { color: var(--blanco-marfil); text-decoration: none; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .nav-menu a:hover { color: var(--dorado); }

        .main-container {
            min-height: 100vh; padding: 140px 20px 60px 20px;
            background: linear-gradient(rgba(15,15,15,0.85), rgba(15,15,15,0.85)), url('Maestro 7 Disponibilidad.png') center/cover no-repeat fixed;
            display: flex; flex-direction: column; align-items: center; box-sizing: border-box;
        }

        .month-nav { display: flex; gap: 10px; margin-bottom: 35px; flex-wrap: wrap; justify-content: center; border-bottom: 1px solid rgba(197, 160, 89, 0.2); padding-bottom: 20px; width: 100%; max-width: 1000px; }
        .month-item { color: var(--blanco-marfil); text-decoration: none; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; transition: 0.3s; padding: 8px 12px; cursor: pointer; opacity: 0.5; }
        .month-item.active { color: var(--dorado); border-bottom: 1px solid var(--dorado); opacity: 1; }
        
        .calendar-box { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(197, 160, 89, 0.2); padding: 40px; border-radius: 4px; max-width: 1000px; width: 100%; box-shadow: 0 30px 60px rgba(0,0,0,0.5); box-sizing: border-box; }

        .title-cal { font-family: var(--font-serif); color: var(--dorado); font-size: 2.2rem; margin: 0; text-transform: uppercase; letter-spacing: 5px; text-align: center; }
        .subtitle { font-size: 0.7rem; letter-spacing: 4px; text-transform: uppercase; color: #888; text-align: center; margin-bottom: 40px; }
        .current-month-display { font-family: var(--font-serif); font-size: 1.6rem; color: var(--dorado); text-align: center; margin-bottom: 30px; letter-spacing: 3px; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .day-header { font-weight: 600; color: var(--dorado); text-align: center; font-size: 0.7rem; text-transform: uppercase; padding-bottom: 15px; }
        
        .day { aspect-ratio: 1.2 / 1; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(197, 160, 89, 0.15); cursor: pointer; transition: 0.3s; color: var(--dorado); font-size: 1rem; position: relative; }
        .day:hover { background: var(--dorado); color: var(--oscuro); font-weight: 600; }
        .day.empty { border: none; cursor: default; }
        
        /* Estilo para días ocupados */
        .day.ocupado { background: rgba(255, 0, 0, 0.15); color: #666; cursor: not-allowed; border: 1px solid rgba(255, 0, 0, 0.3); }
        .day.ocupado:hover { background: rgba(255, 0, 0, 0.25); color: #fff; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .modal-content { background: var(--oscuro); border: 1px solid var(--dorado); padding: 30px; width: 100%; max-width: 500px; position: relative; max-height: 90vh; overflow-y: auto; }
        
        input, select { background: transparent; border: none; border-bottom: 1px solid rgba(197, 160, 89, 0.4); padding: 12px; color: var(--blanco-marfil); width: 100%; margin-bottom: 15px; font-family: var(--font-sans); outline: none; border-radius: 0; display: block; box-sizing: border-box; }
        .btn-submit { background: var(--dorado); color: var(--oscuro); border: none; padding: 18px; width: 100%; font-family: var(--font-serif); font-weight: 700; letter-spacing: 2px; cursor: pointer; transition: 0.3s; text-transform: uppercase; margin-top: 10px; }

        @media (max-width: 768px) {
            header { padding: 20px 30px; }
            .nav-menu { display: none; }
            .calendar-box { padding: 20px 10px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">Marco Iván Cabrera</a>
        <nav class="nav-menu">
            <a href="index.html#servicios">Servicios</a>
            <a href="disponibilidad.html">Disponibilidad</a>
            <a href="https://wa.me/51930046681">Reservas</a>
        </nav>
    </header>

    <div class="main-container">
        <nav class="month-nav" id="monthNav"></nav>
        <div id="calendarArea" class="calendar-box">
            <h1 class="title-cal">Calendario de Gala</h1>
            <p class="subtitle">Agenda Protocolar | Marco Iván Cabrera</p>
            <div id="calendarTitle" class="current-month-display"></div>
            <div class="calendar-grid" id="calendarGrid"></div>
        </div>
        
        <div id="thanksSection" class="calendar-box" style="display:none; text-align:center;">
            <h2 style="color: var(--dorado); font-family: var(--font-serif);">¡MENSAJE LISTO!</h2>
            <p>Se ha generado su solicitud de protocolo.</p>
            <a href="disponibilidad.html" class="btn-submit" style="display:inline-block; text-decoration:none; margin-top:20px;">VOLVER</a>
        </div>
    </div>

    <div id="bookingModal" class="modal-overlay">
        <div class="modal-content">
            <span onclick="closeModal()" style="position: absolute; top: 15px; right: 20px; color: var(--dorado); font-size: 30px; cursor: pointer;">&times;</span>
            <h2 id="modalDateTitle" style="font-family: var(--font-serif); color: var(--dorado); text-align: center; letter-spacing: 2px; margin-bottom: 20px;">FECHA</h2>
            
            <form id="galaForm">
                <input type="hidden" id="hiddenDate">
                <input type="text" id="f_nombre" placeholder="NOMBRE COMPLETO" required>
                <input type="text" id="f_dni" placeholder="DNI" required pattern="\d{8}" maxlength="8">
                <input type="tel" id="f_celular" placeholder="CELULAR / WHATSAPP" required>

                <select id="f_evento" required>
                    <option value="" disabled selected>TIPO DE EVENTO</option>
                    <option value="Matrimonio">Matrimonio</option>
                    <option value="Quinceaños">Quinceaños</option>
                    <option value="Bautizo">Bautizo</option>
                    <option value="Cumpleaños">Cumpleaños</option>
                    <option value="Institucional">Institucional</option>
                    <option value="Académico">Académico</option>
                </select>

                <button type="button" class="btn-submit" onclick="enviarWhatsApp()">SOLICITAR PROTOCOLO</button>
            </form>
        </div>
    </div>

    <script>
        // EL ENLACE QUE COPIASTE DEL EXCEL:
        const SHEETS_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT44vHcadOnZWmsp81vJEI096ECp-RgC7DcP2UW1tkOM-tiHFRw-TNHTZhxuSrStliuttBixgihOFj/pub?output=csv';
        
        const agendaConfirmada = {}; 
        const months = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
        let currentMonth = new Date().getMonth(); 
        const currentYear = 2026;

        async function cargarAgenda() {
            try {
                const response = await fetch(SHEETS_CSV);
                const data = await response.text();
                const filas = data.split('\n').slice(1); 

                filas.forEach(fila => {
                    const columnas = fila.split(',');
                    const fechaRaw = columnas[0]; 
                    if (fechaRaw) {
                        const partes = fechaRaw.trim().split('-');
                        if(partes.length === 3) {
                            // Guardamos la fecha como DD/MM/AAAA
                            const fechaKey = `${partes[2].padStart(2,'0')}/${partes[1].padStart(2,'0')}/${partes[0]}`;
                            agendaConfirmada[fechaKey] = true;
                        }
                    }
                });
                renderCalendar(); 
            } catch (e) { console.error("Error cargando agenda"); }
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            document.getElementById('calendarTitle').innerText = `${months[currentMonth].toUpperCase()} ${currentYear}`;
            
            ['Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb', 'Dom'].forEach(h => {
                grid.appendChild(Object.assign(document.createElement('div'), {className: 'day-header', innerText: h}));
            });

            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const startingPoint = (firstDay === 0) ? 6 : firstDay - 1;
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

            for (let i = 0; i < startingPoint; i++) grid.appendChild(Object.assign(document.createElement('div'), {className: 'day empty'}));

            for (let i = 1; i <= daysInMonth; i++) {
                const day = document.createElement('div');
                day.className = 'day';
                day.innerText = i;
                
                const fechaKey = `${i.toString().padStart(2, '0')}/${(currentMonth + 1).toString().padStart(2, '0')}/${currentYear}`;
                
                if (agendaConfirmada[fechaKey]) {
                    day.classList.add('ocupado');
                    day.innerText += ' 🔒';
                    day.onclick = () => alert('Esta fecha ya se encuentra reservada.');
                } else {
                    day.onclick = () => openModal(i, currentMonth, currentYear);
                }
                grid.appendChild(day);
            }
        }

        function openModal(day, month, year) {
            const fullDate = `${day} de ${months[month]} de ${year}`;
            document.getElementById('modalDateTitle').innerText = fullDate.toUpperCase();
            document.getElementById('hiddenDate').value = fullDate;
            document.getElementById('bookingModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('bookingModal').style.display = 'none'; }

        function enviarWhatsApp() {
            const msg = `*SOLICITUD DE PROTOCOLO*%0A` +
                        `*CLIENTE:* ${document.getElementById('f_nombre').value.toUpperCase()}%0A` +
                        `*FECHA:* ${document.getElementById('hiddenDate').value}`;
            window.open(`https://api.whatsapp.com/send?phone=51930046681&text=${msg}`, '_blank');
            closeModal();
            document.getElementById('calendarArea').style.display = 'none';
            document.getElementById('thanksSection').style.display = 'block';
        }

        function renderMonthNav() {
            const nav = document.getElementById('monthNav');
            nav.innerHTML = '';
            months.forEach((m, index) => {
                const btn = document.createElement('a');
                btn.className = `month-item ${index === currentMonth ? 'active' : ''}`;
                btn.innerText = m.substring(0, 3);
                btn.onclick = () => { currentMonth = index; renderCalendar(); renderMonthNav(); };
                nav.appendChild(btn);
            });
        }

        renderMonthNav(); 
        cargarAgenda();
    </script>
</body>
</html>
