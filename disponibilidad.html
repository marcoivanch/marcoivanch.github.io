<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario de Gala | Marco Iván Cabrera</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --dorado: #c5a059;
            --oscuro-puro: #0a0a0a;
            --blanco-marfil: #fdfcfb;
            --font-serif: 'Cinzel', serif;
            --font-sans: 'Montserrat', sans-serif;
            --verde-wsp: #25d366;
        }

        body, html { margin: 0; padding: 0; min-height: 100%; background-color: var(--oscuro-puro); font-family: var(--font-sans); color: var(--blanco-marfil); overflow-x: hidden; }

        .main-container {
            min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                        url('Maestro 7 Disponibilidad.png') center/cover no-repeat fixed;
            filter: grayscale(100%);
            transition: 1.2s ease;
            display: flex; flex-direction: column; align-items: center; padding: 40px 20px;
            box-sizing: border-box;
        }

        .main-container:hover { filter: grayscale(0%); background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('Maestro 7 Disponibilidad.png') center/cover no-repeat fixed; }

        .month-nav { display: flex; gap: 10px; margin-bottom: 35px; flex-wrap: wrap; justify-content: center; border-bottom: 1px solid rgba(197, 160, 89, 0.3); padding-bottom: 20px; width: 100%; max-width: 1000px; }
        .month-item { color: var(--blanco-marfil); text-decoration: none; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; transition: 0.3s; padding: 10px 15px; cursor: pointer; font-weight: 700; opacity: 0.6; }
        .month-item.active { color: var(--dorado); border: 1px solid var(--dorado); background: rgba(197, 160, 89, 0.1); opacity: 1; }
        
        .calendar-box { background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(10px); border: 1px solid rgba(197, 160, 89, 0.25); padding: 45px; border-radius: 2px; max-width: 1000px; width: 100%; box-shadow: 0 40px 100px rgba(0,0,0,0.8); box-sizing: border-box; }

        h1 { font-family: var(--font-serif); color: var(--dorado); font-size: 2.6rem; margin: 0; text-transform: uppercase; letter-spacing: 7px; text-align: center; }
        .subtitle { font-size: 0.7rem; letter-spacing: 5px; text-transform: uppercase; color: #aaa; text-align: center; margin-bottom: 45px; }
        .current-month-display { font-family: var(--font-serif); font-size: 1.8rem; color: var(--dorado); text-align: center; margin-bottom: 30px; letter-spacing: 4px; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; }
        .day-header { font-weight: 700; color: var(--dorado); text-align: center; font-size: 0.75rem; text-transform: uppercase; padding-bottom: 15px; }
        
        .day { aspect-ratio: 1.3 / 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid rgba(197, 160, 89, 0.2); cursor: pointer; transition: 0.3s; color: var(--dorado); position: relative; padding: 5px; text-align: center; font-size: 1.1rem; }
        .day:hover:not(.occupied) { background: var(--dorado); color: var(--oscuro-puro); font-weight: 700; transform: scale(1.05); z-index: 10; }
        
        .day.occupied { background: rgba(197, 160, 89, 0.08); border: 1px solid var(--dorado); color: var(--blanco-marfil); cursor: default; }
        .occupied-label { font-size: 0.55rem; color: var(--dorado); margin-top: 4px; line-height: 1.2; font-weight: 400; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .day.empty { border: none; cursor: default; }

        /* MODAL Y FORMULARIO */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 3000; align-items: center; justify-content: center; }
        .modal-content { background: #0a0a0a; border: 1px solid var(--dorado); padding: 40px; width: 95%; max-width: 550px; position: relative; box-sizing: border-box; }
        
        .form-row { display: flex; gap: 15px; margin-bottom: 15px; align-items: center; flex-wrap: wrap; }
        input, select { background: transparent; border: none; border-bottom: 1px solid rgba(197, 160, 89, 0.4); padding: 12px; color: var(--blanco-marfil); width: 100%; font-size: 0.85rem; outline: none; border-radius: 0; box-sizing: border-box; }
        
        select option { background-color: #0a0a0a !important; color: var(--dorado) !important; }

        .time-input-container { display: flex; align-items: center; gap: 5px; color: var(--dorado); font-weight: 700; background: rgba(197, 160, 89, 0.05); padding: 5px; }
        .time-box { width: 45px !important; text-align: center; padding: 8px 2px !important; border-bottom: 1px solid var(--dorado) !important; }

        .btn-submit { background: var(--dorado); color: var(--oscuro-puro); border: none; padding: 15px; width: 100%; font-family: var(--font-serif); font-weight: 700; letter-spacing: 2px; cursor: pointer; transition: 0.3s; margin-top: 20px; text-transform: uppercase; }
        .btn-submit:hover { background: var(--blanco-marfil); transform: translateY(-3px); }

        #thanksSection { display: none; text-align: center; }
        .sec-photo { width: 180px; height: 180px; border-radius: 50%; border: 2px solid var(--dorado); margin-bottom: 25px; object-fit: cover; }

        @media (max-width: 768px) {
            .main-container { padding: 20px 10px; }
            h1 { font-size: 1.5rem; letter-spacing: 3px; }
            .calendar-box { padding: 20px 10px; overflow-x: auto; }
            .calendar-grid { gap: 5px; min-width: 320px; }
            .day { aspect-ratio: 1/1.1; font-size: 0.9rem; min-height: 50px; }
            .occupied-label { font-size: 0.4rem; display: block; }
            .form-row { flex-direction: column; gap: 10px; }
            .time-input-container { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <nav class="month-nav" id="monthNav"></nav>

        <div id="calendarArea" class="calendar-box">
            <h1>Calendario de Gala</h1>
            <p class="subtitle">Agenda Protocolar | Marco Iván Cabrera</p>
            <div id="calendarTitle" class="current-month-display"></div>
            <div class="calendar-grid" id="calendarGrid"></div>
        </div>

        <div id="thanksSection" class="calendar-box">
            <img src="secretaria.jpg" alt="Dominik" class="sec-photo">
            <div style="color: var(--verde-wsp); font-family: var(--font-serif); font-size: 1.6rem; margin-bottom: 15px;">MENSAJE RECIBIDO</div>
            <div style="font-size: 1rem; color: var(--blanco-marfil); margin-bottom: 25px;">El Maestro de Ceremonias Marco Cabrera le contactará.</div>
            <p style="color: var(--dorado); font-family: var(--font-serif); font-size: 1.2rem; margin:0;">Dominik Chumbile Romero</p>
            <p style="font-size: 0.7rem; letter-spacing: 4px; color: #888;">SECRETARIA</p>
            <a href="index.html" style="color: var(--dorado); text-decoration: none; border: 1px solid var(--dorado); padding: 10px 20px; font-size: 0.7rem; display: inline-block; margin-top: 20px;">VOLVER AL INICIO</a>
        </div>
    </div>

    <div id="bookingModal" class="modal-overlay">
        <div class="modal-content">
            <span onclick="closeModal()" style="position: absolute; top: 15px; right: 20px; color: var(--dorado); font-size: 30px; cursor: pointer;">&times;</span>
            <h2 id="modalDateTitle" style="font-family: var(--font-serif); color: var(--dorado); text-align: center; letter-spacing: 3px; font-size: 1.2rem;">FECHA</h2>
            
            <form id="galaForm">
                <input type="hidden" id="hiddenDate">
                <div class="form-row">
                    <input type="text" id="f_nombre" placeholder="NOMBRE COMPLETO" required>
                    <input type="text" id="f_dni" placeholder="DNI" required pattern="\d{8}" maxlength="8">
                </div>
                <div class="form-row">
                    <input type="tel" id="f_celular" placeholder="CELULAR" required>
                    <select id="f_evento" required>
                        <option value="" disabled selected>TIPO DE EVENTO</option>
                        <option value="Matrimonio">Matrimonio</option>
                        <option value="Quinceaños">Quinceaños</option>
                        <option value="Bautizo">Bautizo</option>
                        <option value="Cumpleaños">Cumpleaños</option>
                        <option value="Bodas de Oro/Plata">Bodas de Oro/Plata</option>
                        <option value="Institucional">Institucional</option>
                        <option value="Académico">Académico</option>
                        <option value="Otro">Otro</option>
                    </select>
                </div>

                <div class="form-row">
                    <div style="flex: 1.2;">
                        <label style="font-size: 0.6rem; color: var(--dorado);">HORA INICIO</label>
                        <div class="time-input-container">
                            <input type="text" id="f_hh" class="time-box" placeholder="10" maxlength="2" required>
                            <span style="color:var(--dorado)">:</span>
                            <input type="text" id="f_mm" class="time-box" placeholder="00" maxlength="2" required>
                            <select id="f_ampm" style="width: 70px !important; border:none;"><option value="AM">AM</option><option value="PM" selected>PM</option></select>
                        </div>
                    </div>
                    <div style="flex: 1;">
                        <label style="font-size: 0.6rem; color: var(--dorado);">DISTRITO / CIUDAD</label>
                        <select id="f_lugar" required>
                            <option value="" disabled selected>SELECCIONE</option>
                            <option value="Ancón">Ancón</option><option value="Ate">Ate</option><option value="Barranco">Barranco</option><option value="Breña">Breña</option><option value="Carabayllo">Carabayllo</option><option value="Chaclacayo">Chaclacayo</option><option value="Chorrillos">Chorrillos</option><option value="Cieneguilla">Cieneguilla</option><option value="Comas">Comas</option><option value="El Agustino">El Agustino</option><option value="Independencia">Independencia</option><option value="Jesús María">Jesús María</option><option value="La Molina">La Molina</option><option value="La Victoria">La Victoria</option><option value="Lima (Cercado)">Lima (Cercado)</option><option value="Lince">Lince</option><option value="Los Olivos">Los Olivos</option><option value="Lurigancho-Chosica">Lurigancho-Chosica</option><option value="Lurín">Lurín</option><option value="Magdalena del Mar">Magdalena del Mar</option><option value="Miraflores">Miraflores</option><option value="Pachacámac">Pachacámac</option><option value="Pucusana">Pucusana</option><option value="Pueblo Libre">Pueblo Libre</option><option value="Puente Piedra">Puente Piedra</option><option value="Punta Hermosa">Punta Hermosa</option><option value="Punta Negra">Punta Negra</option><option value="Rímac">Rímac</option><option value="San Bartolo">San Bartolo</option><option value="San Borja">San Borja</option><option value="San Isidro">San Isidro</option><option value="San Juan de Lurigancho">San Juan de Lurigancho</option><option value="San Juan de Miraflores">San Juan de Miraflores</option><option value="San Luis">San Luis</option><option value="San Martín de Porres">San Martín de Porres</option><option value="San Miguel">San Miguel</option><option value="Santa Anita">Santa Anita</option><option value="Santa María del Mar">Santa María del Mar</option><option value="Santa Rosa">Santa Rosa</option><option value="Santiago de Surco">Santiago de Surco</option><option value="Surquillo">Surquillo</option><option value="Villa El Salvador">Villa El Salvador</option><option value="Villa María del Triunfo">Villa María del Triunfo</option>
                            <option value="Callao">Callao</option><option value="Bellavista">Bellavista</option><option value="Carmen de la Legua">Carmen de la Legua</option><option value="La Perla">La Perla</option><option value="La Punta">La Punta</option><option value="Ventanilla">Ventanilla</option>
                            <option value="PROVINCIA">FUERA DE LIMA / PROVINCIA</option>
                        </select>
                    </div>
                </div>

                <button type="button" class="btn-submit" onclick="enviarWhatsApp()">SOLICITAR PROTOCOLO VÍA WHATSAPP</button>
            </form>
        </div>
    </div>

    <script>
        // SECCIÓN LIMPIA: RESERVAS ELIMINADAS
        const reservas = {}; 

        const months = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
        let currentMonth = new Date().getMonth(); 
        const currentYear = 2026;

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            document.getElementById('calendarTitle').innerText = `${months[currentMonth].toUpperCase()} ${currentYear}`;
            ['Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb', 'Dom'].forEach(h => {
                grid.appendChild(Object.assign(document.createElement('div'), {className: 'day-header', innerText: h}));
            });

            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const startingPoint = (firstDay === 0) ? 6 : firstDay - 1;
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

            for (let i = 0; i < startingPoint; i++) grid.appendChild(Object.assign(document.createElement('div'), {className: 'day empty'}));

            for (let i = 1; i <= daysInMonth; i++) {
                const day = document.createElement('div');
                const fechaID = `${currentYear}-${(currentMonth + 1).toString().padStart(2, '0')}-${i.toString().padStart(2, '0')}`;
                day.className = 'day';
                day.innerHTML = `<span>${i}</span>`;
                
                if (reservas[fechaID]) {
                    day.classList.add('occupied');
                    day.innerHTML += `<div class="occupied-label">Separado<br>${reservas[fechaID]}</div>`;
                } else {
                    day.onclick = () => openModal(i, currentMonth, currentYear);
                }
                grid.appendChild(day);
            }
        }

        function openModal(day, month, year) {
            const fullDate = `${day} de ${months[month]} de ${year}`;
            document.getElementById('modalDateTitle').innerText = fullDate.toUpperCase();
            document.getElementById('hiddenDate').value = fullDate;
            document.getElementById('bookingModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('bookingModal').style.display = 'none'; }

        function enviarWhatsApp() {
            const form = document.getElementById('galaForm');
            if(!form.reportValidity()) return;

            const nombre = document.getElementById('f_nombre').value.toUpperCase();
            const dni = document.getElementById('f_dni').value;
            const evento = document.getElementById('f_evento').value;
            const lugar = document.getElementById('f_lugar').value;
            const fecha = document.getElementById('hiddenDate').value;
            const horaFull = `${document.getElementById('f_hh').value}:${document.getElementById('f_mm').value} ${document.getElementById('f_ampm').value}`;
            
            const mensaje = `*SOLICITUD DE PROTOCOLO*%0A------------------------------%0A*CLIENTE:* ${nombre}%0A*DNI:* ${dni}%0A*EVENTO:* ${evento}%0A*FECHA:* ${fecha}%0A*HORA:* ${horaFull}%0A*LUGAR:* ${lugar}%0A------------------------------%0A_Enviado desde el Portal de Gala_`;

            window.open(`https://api.whatsapp.com/send?phone=51930046681&text=${mensaje}`, '_blank');
            closeModal();
            document.getElementById('calendarArea').style.display = 'none';
            document.getElementById('monthNav').style.display = 'none';
            document.getElementById('thanksSection').style.display = 'block';
            window.scrollTo(0,0);
        }

        function renderMonthNav() {
            const nav = document.getElementById('monthNav');
            nav.innerHTML = '';
            months.forEach((m, index) => {
                const btn = document.createElement('a');
                btn.className = `month-item ${index === currentMonth ? 'active' : ''}`;
                btn.innerText = m.substring(0, 3);
                btn.onclick = () => { currentMonth = index; renderCalendar(); renderMonthNav(); };
                nav.appendChild(btn);
            });
        }

        renderMonthNav();
        renderCalendar();
    </script>
</body>
</html>
