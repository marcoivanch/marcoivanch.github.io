<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disponibilidad | Marco Iván Cabrera Hernández</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Great+Vibes&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --dorado: #c5a059;
            --oscuro: #0f0f0f;
            --blanco-marfil: #fdfcfb;
            --whatsapp-verde: #25d366;
            --font-serif: 'Cinzel', serif;
            --font-cursive: 'Great Vibes', cursive;
            --font-sans: 'Montserrat', sans-serif;
        }

        body, html { margin: 0; padding: 0; min-height: 100%; background-color: var(--oscuro); font-family: var(--font-sans); color: var(--blanco-marfil); overflow-x: hidden; }

        /* --- HEADER --- */
        header {
            position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center;
            padding: 25px 80px; box-sizing: border-box; z-index: 1000; background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(12px); border-bottom: 1px solid rgba(197, 160, 89, 0.2);
        }

        .logo { font-family: var(--font-serif); font-size: 1.2rem; letter-spacing: 3px; color: var(--dorado); text-transform: uppercase; text-decoration: none; }
        .nav-menu { display: flex; gap: 40px; }
        .nav-menu a { color: var(--blanco-marfil); text-decoration: none; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .nav-menu a:hover { color: var(--dorado); }
        .hamburger { display: none; flex-direction: column; cursor: pointer; gap: 6px; }
        .hamburger span { width: 30px; height: 2px; background-color: var(--dorado); transition: 0.4s; }

        /* --- WSP --- */
        .wsp-float {
            position: fixed; width: 60px; height: 60px; bottom: 30px; right: 30px; background-color: var(--whatsapp-verde);
            color: #FFF; border-radius: 50px; text-align: center; z-index: 2000; display: flex; align-items: center;
            justify-content: center; text-decoration: none; transition: 0.3s; box-shadow: 2px 2px 15px rgba(0,0,0,0.5);
        }

        /* --- CALENDARIO --- */
        .main-container {
            min-height: 100vh; padding: 140px 20px 60px 20px;
            background: linear-gradient(rgba(15,15,15,0.85), rgba(15,15,15,0.85)), url('Maestro 7 Disponibilidad.png') center/cover no-repeat fixed;
            display: flex; flex-direction: column; align-items: center; box-sizing: border-box;
        }

        .month-nav { display: flex; gap: 10px; margin-bottom: 35px; flex-wrap: wrap; justify-content: center; border-bottom: 1px solid rgba(197, 160, 89, 0.2); padding-bottom: 20px; width: 100%; max-width: 1000px; }
        .month-item { color: var(--blanco-marfil); text-decoration: none; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; transition: 0.3s; padding: 8px 12px; cursor: pointer; opacity: 0.5; }
        .month-item.active { color: var(--dorado); border-bottom: 1px solid var(--dorado); opacity: 1; }
        
        .calendar-box { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(197, 160, 89, 0.2); padding: 40px; border-radius: 4px; max-width: 1000px; width: 100%; box-shadow: 0 30px 60px rgba(0,0,0,0.5); box-sizing: border-box; }

        .title-cal { font-family: var(--font-serif); color: var(--dorado); font-size: 2.2rem; margin: 0; text-transform: uppercase; letter-spacing: 5px; text-align: center; }
        .subtitle { font-size: 0.7rem; letter-spacing: 4px; text-transform: uppercase; color: #888; text-align: center; margin-bottom: 40px; }
        .current-month-display { font-family: var(--font-serif); font-size: 1.6rem; color: var(--dorado); text-align: center; margin-bottom: 30px; letter-spacing: 3px; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .day-header { font-weight: 600; color: var(--dorado); text-align: center; font-size: 0.7rem; text-transform: uppercase; padding-bottom: 15px; }
        .day { aspect-ratio: 1.2 / 1; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(197, 160, 89, 0.15); cursor: pointer; transition: 0.3s; color: var(--dorado); font-size: 1rem; }
        .day:hover { background: var(--dorado); color: var(--oscuro); font-weight: 600; }
        .day.empty { border: none; cursor: default; }

        /* --- MODAL Y FORMULARIO (CORRECCIÓN DE LISTAS) --- */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .modal-content { background: var(--oscuro); border: 1px solid var(--dorado); padding: 30px; width: 100%; max-width: 500px; position: relative; max-height: 90vh; overflow-y: auto; }
        
        input, select { background: transparent; border: none; border-bottom: 1px solid rgba(197, 160, 89, 0.4); padding: 12px; color: var(--blanco-marfil); width: 100%; margin-bottom: 15px; font-family: var(--font-sans); outline: none; border-radius: 0; display: block; }
        
        /* Asegura que las opciones se vean oscuras en escritorio y móvil */
        select option { background-color: #1a1a1a !important; color: var(--dorado) !important; padding: 10px; }

        .time-row { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; justify-content: center; }
        .time-box { text-align: center; width: 50px !important; margin-bottom: 0; }

        .btn-submit { background: var(--dorado); color: var(--oscuro); border: none; padding: 18px; width: 100%; font-family: var(--font-serif); font-weight: 700; letter-spacing: 2px; cursor: pointer; transition: 0.3s; text-transform: uppercase; margin-top: 10px; }

        @media (max-width: 768px) {
            header { padding: 20px 30px; }
            .hamburger { display: flex; }
            .nav-menu { position: fixed; left: -100%; top: 70px; flex-direction: column; background: rgba(15, 15, 15, 0.95); width: 100%; text-align: center; transition: 0.3s; padding: 40px 0; gap: 30px; border-bottom: 1px solid var(--dorado); }
            .nav-menu.active { left: 0; }
            .calendar-box { padding: 20px 10px; overflow-x: auto; }
            .calendar-grid { min-width: 400px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">Marco Iván Cabrera</a>
        <div class="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></div>
        <nav class="nav-menu" id="navMenu">
            <a href="index.html#servicios" onclick="toggleMenu()">Servicios</a>
            <a href="disponibilidad.html" onclick="toggleMenu()">Disponibilidad</a>
            <a href="https://wa.me/51930046681?text=Deseo%20información%20sobre%20sus%20servicios">Reservas</a>
        </nav>
    </header>

    <a href="https://wa.me/51930046681?text=Deseo%20información%20sobre%20sus%20servicios" class="wsp-float" target="_blank">
        <svg fill="#fff" width="35px" height="35px" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
    </a>

    <div class="main-container">
        <nav class="month-nav" id="monthNav"></nav>
        <div id="calendarArea" class="calendar-box">
            <h1 class="title-cal">Calendario de Gala</h1>
            <p class="subtitle">Agenda Protocolar | Marco Iván Cabrera</p>
            <div id="calendarTitle" class="current-month-display"></div>
            <div class="calendar-grid" id="calendarGrid"></div>
        </div>
        <div id="thanksSection" class="calendar-box" style="display:none; text-align:center;">
            <h2 style="color: var(--dorado); font-family: var(--font-serif);">¡MENSAJE LISTO!</h2>
            <p>Se ha generado su solicitud de protocolo.</p>
            <a href="index.html" class="btn-submit" style="display:inline-block; text-decoration:none;">VOLVER</a>
        </div>
    </div>

    <div id="bookingModal" class="modal-overlay">
        <div class="modal-content">
            <span onclick="closeModal()" style="position: absolute; top: 15px; right: 20px; color: var(--dorado); font-size: 30px; cursor: pointer;">&times;</span>
            <h2 id="modalDateTitle" style="font-family: var(--font-serif); color: var(--dorado); text-align: center; letter-spacing: 2px; margin-bottom: 20px;">FECHA</h2>
            
            <form id="galaForm">
                <input type="hidden" id="hiddenDate">
                <input type="text" id="f_nombre" placeholder="NOMBRE COMPLETO" required>
                <input type="text" id="f_dni" placeholder="DNI" required pattern="\d{8}" maxlength="8">
                <input type="tel" id="f_celular" placeholder="CELULAR / WHATSAPP" required>

                <select id="f_evento" required>
                    <option value="" disabled selected>TIPO DE EVENTO</option>
                    <option value="Matrimonio">Matrimonio</option>
                    <option value="Quinceaños">Quinceaños</option>
                    <option value="Bautizo">Bautizo</option>
                    <option value="Cumpleaños">Cumpleaños</option>
                    <option value="Bodas de Oro/Plata">Bodas de Oro/Plata</option>
                    <option value="Institucional">Institucional</option>
                    <option value="Académico">Académico</option>
                    <option value="Otro">Otro</option>
                </select>

                <div class="time-row">
                    <span style="font-size: 0.7rem; color: var(--dorado);">HORA:</span>
                    <input type="text" id="f_hh" class="time-box" placeholder="10" maxlength="2" required>
                    <span>:</span>
                    <input type="text" id="f_mm" class="time-box" placeholder="00" maxlength="2" required>
                    <select id="f_ampm" style="width: 70px; margin-bottom: 0;"><option value="AM">AM</option><option value="PM" selected>PM</option></select>
                </div>

                <select id="f_lugar" required>
                    <option value="" disabled selected>DISTRITO / CIUDAD</option>
                    <option value="Ancón">Ancón</option><option value="Ate">Ate</option><option value="Barranco">Barranco</option><option value="Breña">Breña</option><option value="Carabayllo">Carabayllo</option><option value="Chaclacayo">Chaclacayo</option><option value="Chorrillos">Chorrillos</option><option value="Cieneguilla">Cieneguilla</option><option value="Comas">Comas</option><option value="El Agustino">El Agustino</option><option value="Independencia">Independencia</option><option value="Jesús María">Jesús María</option><option value="La Molina">La Molina</option><option value="La Victoria">La Victoria</option><option value="Lima (Cercado)">Lima (Cercado)</option><option value="Lince">Lince</option><option value="Los Olivos">Los Olivos</option><option value="Lurigancho-Chosica">Lurigancho-Chosica</option><option value="Lurín">Lurín</option><option value="Magdalena del Mar">Magdalena del Mar</option><option value="Miraflores">Miraflores</option><option value="Pachacámac">Pachacámac</option><option value="Pucusana">Pucusana</option><option value="Pueblo Libre">Pueblo Libre</option><option value="Puente Piedra">Puente Piedra</option><option value="Punta Hermosa">Punta Hermosa</option><option value="Punta Negra">Punta Negra</option><option value="Rímac">Rímac</option><option value="San Bartolo">San Bartolo</option><option value="San Borja">San Borja</option><option value="San Isidro">San Isidro</option><option value="San Juan de Lurigancho">San Juan de Lurigancho</option><option value="San Juan de Miraflores">San Juan de Miraflores</option><option value="San Luis">San Luis</option><option value="San Martín de Porres">San Martín de Porres</option><option value="San Miguel">San Miguel</option><option value="Santa Anita">Santa Anita</option><option value="Santa María del Mar">Santa María del Mar</option><option value="Santa Rosa">Santa Rosa</option><option value="Santiago de Surco">Santiago de Surco</option><option value="Surquillo">Surquillo</option><option value="Villa El Salvador">Villa El Salvador</option><option value="Villa María del Triunfo">Villa María del Triunfo</option>
                    <option value="Callao">Callao</option><option value="Bellavista">Bellavista</option><option value="Carmen de la Legua">Carmen de la Legua</option><option value="La Perla">La Perla</option><option value="La Punta">La Punta</option><option value="Ventanilla">Ventanilla</option>
                    <option value="PROVINCIA">FUERA DE LIMA / PROVINCIA</option>
                </select>

                <button type="button" class="btn-submit" onclick="enviarWhatsApp()">SOLICITAR PROTOCOLO</button>
            </form>
        </div>
    </div>

    <script>
        const months = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
        let currentMonth = new Date().getMonth(); 
        const currentYear = 2026;

        function toggleMenu() { document.getElementById('navMenu').classList.toggle('active'); }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            document.getElementById('calendarTitle').innerText = `${months[currentMonth].toUpperCase()} ${currentYear}`;
            ['Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb', 'Dom'].forEach(h => {
                grid.appendChild(Object.assign(document.createElement('div'), {className: 'day-header', innerText: h}));
            });
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const startingPoint = (firstDay === 0) ? 6 : firstDay - 1;
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            for (let i = 0; i < startingPoint; i++) grid.appendChild(Object.assign(document.createElement('div'), {className: 'day empty'}));
            for (let i = 1; i <= daysInMonth; i++) {
                const day = document.createElement('div');
                day.className = 'day'; day.innerText = i;
                day.onclick = () => openModal(i, currentMonth, currentYear);
                grid.appendChild(day);
            }
        }

        function openModal(day, month, year) {
            const fullDate = `${day} de ${months[month]} de ${year}`;
            document.getElementById('modalDateTitle').innerText = fullDate.toUpperCase();
            document.getElementById('hiddenDate').value = fullDate;
            document.getElementById('bookingModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('bookingModal').style.display = 'none'; }

        function enviarWhatsApp() {
            const form = document.getElementById('galaForm');
            if(!form.reportValidity()) return;
            const msg = `*SOLICITUD DE PROTOCOLO*%0A*CLIENTE:* ${document.getElementById('f_nombre').value.toUpperCase()}%0A*DNI:* ${document.getElementById('f_dni').value}%0A*EVENTO:* ${document.getElementById('f_evento').value}%0A*FECHA:* ${document.getElementById('hiddenDate').value}%0A*HORA:* ${document.getElementById('f_hh').value}:${document.getElementById('f_mm').value} ${document.getElementById('f_ampm').value}%0A*LUGAR:* ${document.getElementById('f_lugar').value}`;
            window.open(`https://api.whatsapp.com/send?phone=51930046681&text=${msg}`, '_blank');
            closeModal();
            document.getElementById('calendarArea').style.display = 'none';
            document.getElementById('thanksSection').style.display = 'block';
        }

        function renderMonthNav() {
            const nav = document.getElementById('monthNav');
            nav.innerHTML = '';
            months.forEach((m, index) => {
                const btn = document.createElement('a');
                btn.className = `month-item ${index === currentMonth ? 'active' : ''}`;
                btn.innerText = m.substring(0, 3);
                btn.onclick = () => { currentMonth = index; renderCalendar(); renderMonthNav(); };
                nav.appendChild(btn);
            });
        }
        renderMonthNav(); renderCalendar();
    </script>
</body>
</html>
