<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disponibilidad | Marco Iván Cabrera Hernández</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Great+Vibes&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --dorado: #c5a059;
            --oscuro: #0f0f0f;
            --blanco-marfil: #fdfcfb;
            --whatsapp-verde: #25d366;
            --font-serif: 'Cinzel', serif;
            --font-cursive: 'Great Vibes', cursive;
            --font-sans: 'Montserrat', sans-serif;
        }

        body, html { margin: 0; padding: 0; min-height: 100%; background-color: var(--oscuro); font-family: var(--font-sans); color: var(--blanco-marfil); overflow-x: hidden; }

        header {
            position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center;
            padding: 25px 80px; box-sizing: border-box; z-index: 1000; background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(12px); border-bottom: 1px solid rgba(197, 160, 89, 0.2);
        }

        .logo { font-family: var(--font-serif); font-size: 1.2rem; letter-spacing: 3px; color: var(--dorado); text-transform: uppercase; text-decoration: none; }
        .nav-menu { display: flex; gap: 40px; }
        .nav-menu a { color: var(--blanco-marfil); text-decoration: none; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .nav-menu a:hover { color: var(--dorado); }
        
        .hamburger { display: none; flex-direction: column; cursor: pointer; gap: 6px; }
        .hamburger span { width: 30px; height: 2px; background-color: var(--dorado); transition: 0.4s; }

        .wsp-float {
            position: fixed; width: 60px; height: 60px; bottom: 30px; right: 30px; background-color: var(--whatsapp-verde);
            color: #FFF; border-radius: 50px; text-align: center; z-index: 2000; display: flex; align-items: center;
            justify-content: center; text-decoration: none; transition: 0.3s; box-shadow: 2px 2px 15px rgba(0,0,0,0.5);
        }

        .main-container {
            min-height: 100vh; padding: 140px 20px 60px 20px;
            background: linear-gradient(rgba(15,15,15,0.85), rgba(15,15,15,0.85)), url('Maestro 7 Disponibilidad.png') center/cover no-repeat fixed;
            display: flex; flex-direction: column; align-items: center; box-sizing: border-box;
        }

        .calendar-box { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(197, 160, 89, 0.2); padding: 40px; border-radius: 4px; max-width: 1000px; width: 100%; box-shadow: 0 30px 60px rgba(0,0,0,0.5); box-sizing: border-box; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .day-header { font-weight: 600; color: var(--dorado); text-align: center; font-size: 0.7rem; text-transform: uppercase; padding-bottom: 15px; }
        
        .day { aspect-ratio: 1.2 / 1; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(197, 160, 89, 0.15); cursor: pointer; transition: 0.3s; color: var(--dorado); font-size: 1rem; position: relative; }
        .day:hover { background: var(--dorado); color: var(--oscuro); font-weight: 600; }
        .day.has-event { background: rgba(197, 160, 89, 0.3); border: 2px solid var(--dorado); font-weight: bold; }
        .day.has-event::after { content: ''; position: absolute; bottom: 5px; width: 5px; height: 5px; background: var(--dorado); border-radius: 50%; }

        /* MODAL */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--oscuro); border: 1px solid var(--dorado); padding: 30px; width: 100%; max-width: 500px; position: relative; }
        
        .event-item { background: rgba(197, 160, 89, 0.1); border-left: 3px solid var(--dorado); padding: 10px; margin-bottom: 15px; font-size: 0.8rem; }

        input, select { background: transparent; border: none; border-bottom: 1px solid rgba(197, 160, 89, 0.4); padding: 12px; color: var(--blanco-marfil); width: 100%; margin-bottom: 15px; display: block; box-sizing: border-box; }
        .btn-submit { background: var(--dorado); color: var(--oscuro); border: none; padding: 18px; width: 100%; font-weight: 700; cursor: pointer; text-transform: uppercase; }

        /* BOTÓN SECRETO */
        .admin-trigger { margin-top: 50px; opacity: 0.1; font-size: 0.6rem; cursor: pointer; color: var(--dorado); }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">Marco Iván Cabrera</a>
        <div class="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></div>
        <nav class="nav-menu" id="navMenu">
            <a href="index.html#servicios">Servicios</a>
            <a href="disponibilidad.html">Disponibilidad</a>
            <a href="https://wa.me/51930046681">Reservas</a>
        </nav>
    </header>

    <div class="main-container">
        <div id="calendarArea" class="calendar-box">
            <h1 style="text-align:center; color:var(--dorado); font-family:var(--font-serif);">Agenda de Gala</h1>
            <div id="calendarTitle" style="text-align:center; margin: 20px 0; color:var(--dorado); letter-spacing:3px;"></div>
            <div class="calendar-grid" id="calendarGrid"></div>
        </div>

        <div class="admin-trigger" onclick="abrirAdmin()">[ ACCESO PRIVADO ]</div>
    </div>

    <div id="bookingModal" class="modal-overlay">
        <div class="modal-content">
            <span onclick="closeModal()" style="position:absolute; top:10px; right:20px; color:var(--dorado); cursor:pointer; font-size:24px;">&times;</span>
            <h2 id="modalDateTitle" style="color:var(--dorado); text-align:center;">FECHA</h2>
            
            <div id="eventos-lista-container"></div>

            <form id="galaForm">
                <input type="hidden" id="hiddenDate">
                <input type="text" id="f_nombre" placeholder="NOMBRE COMPLETO" required>
                <select id="f_evento" required>
                    <option value="Matrimonio">Matrimonio</option>
                    <option value="Quinceaños">Quinceaños</option>
                    <option value="Protocolo">Protocolo</option>
                </select>
                <button type="button" class="btn-submit" onclick="enviarWhatsApp()">SOLICITAR RESERVA</button>
            </form>

            <div id="adminForm" style="display:none; border-top: 1px solid var(--dorado); margin-top:20px; padding-top:20px;">
                <p style="color:var(--dorado); font-size:0.7rem;">REGISTRAR CONTRATO CONFIRMADO:</p>
                <input type="text" id="admin_cliente" placeholder="Nombre Cliente">
                <input type="text" id="admin_hora" placeholder="Hora (ej: 08:00 PM)">
                <button class="btn-submit" onclick="guardarEventoAdmin()">CONFIRMAR EN AGENDA</button>
                <button style="background:red; color:white; margin-top:10px;" class="btn-submit" onclick="borrarEventosDia()">BORRAR EVENTOS DEL DÍA</button>
            </div>
        </div>
    </div>

    <script>
        // Cargar eventos guardados o crear base vacía
        let agenda = JSON.parse(localStorage.getItem('agendaMarco')) || {};
        let isAdmin = false;

        const months = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
        let currentMonth = new Date().getMonth();
        let currentYear = 2026;

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            document.getElementById('calendarTitle').innerText = `${months[currentMonth].toUpperCase()} ${currentYear}`;
            
            ['Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb', 'Dom'].forEach(h => {
                grid.appendChild(Object.assign(document.createElement('div'), {className: 'day-header', innerText: h}));
            });

            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const startingPoint = (firstDay === 0) ? 6 : firstDay - 1;
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

            for (let i = 0; i < startingPoint; i++) grid.appendChild(Object.assign(document.createElement('div'), {className: 'day empty'}));

            for (let i = 1; i <= daysInMonth; i++) {
                const day = document.createElement('div');
                day.className = 'day';
                day.innerText = i;
                const key = `${currentYear}-${currentMonth+1}-${i}`;
                if(agenda[key]) day.classList.add('has-event');
                day.onclick = () => openModal(i, currentMonth, currentYear);
                grid.appendChild(day);
            }
        }

        function openModal(day, month, year) {
            const key = `${year}-${month+1}-${day}`;
            const fullDate = `${day} de ${months[month]} de ${year}`;
            document.getElementById('modalDateTitle').innerText = fullDate.toUpperCase();
            document.getElementById('hiddenDate').value = key;
            
            const container = document.getElementById('eventos-lista-container');
            container.innerHTML = '';
            if(agenda[key]) {
                agenda[key].forEach(ev => {
                    container.innerHTML += `<div class="event-item"><span style="color:var(--dorado)">${ev.hora}</span> - ${ev.cliente} (${ev.tipo})</div>`;
                });
            }

            // Si eres admin, muestra el formulario de registro
            document.getElementById('adminForm').style.display = isAdmin ? 'block' : 'none';
            document.getElementById('galaForm').style.display = isAdmin ? 'none' : 'block';
            document.getElementById('bookingModal').style.display = 'flex';
        }

        function abrirAdmin() {
            const pass = prompt("Ingrese clave de Maestro:");
            if(pass === "1234") { // <--- CAMBIA AQUÍ TU CLAVE
                isAdmin = true;
                alert("Modo Administrador Activo. Ahora al tocar un día podrás registrar contratos.");
            }
        }

        function guardarEventoAdmin() {
            const key = document.getElementById('hiddenDate').value;
            const nuevo = {
                cliente: document.getElementById('admin_cliente').value,
                hora: document.getElementById('admin_hora').value,
                tipo: "CONFIRMADO"
            };
            if(!agenda[key]) agenda[key] = [];
            agenda[key].push(nuevo);
            localStorage.setItem('agendaMarco', JSON.stringify(agenda));
            alert("Evento Guardado en este celular.");
            renderCalendar();
            closeModal();
        }

        function borrarEventosDia() {
            const key = document.getElementById('hiddenDate').value;
            delete agenda[key];
            localStorage.setItem('agendaMarco', JSON.stringify(agenda));
            renderCalendar();
            closeModal();
        }

        function closeModal() { document.getElementById('bookingModal').style.display = 'none'; }
        renderCalendar();
    </script>
</body>
</html>
