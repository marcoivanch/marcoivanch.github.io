<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disponibilidad | Marco Iván Cabrera Hernández</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Great+Vibes&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --dorado: #c5a059;
            --oscuro: #0f0f0f;
            --blanco: #fdfcfb;
            --font-serif: 'Cinzel', serif;
            --font-cursive: 'Great Vibes', cursive;
            --font-sans: 'Montserrat', sans-serif;
        }

        body, html { margin: 0; padding: 0; min-height: 100%; background-color: var(--oscuro); font-family: var(--font-sans); color: var(--blanco); overflow-x: hidden; }

        /* HEADER ORIGINAL */
        header {
            position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center;
            padding: 25px 80px; box-sizing: border-box; z-index: 1000; background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(12px); border-bottom: 1px solid rgba(197, 160, 89, 0.2);
        }

        .logo { font-family: var(--font-serif); font-size: 1.1rem; letter-spacing: 3px; color: var(--dorado); text-transform: uppercase; text-decoration: none; }
        .nav-menu { display: flex; gap: 40px; }
        .nav-menu a { color: var(--blanco); text-decoration: none; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .nav-menu a:hover { color: var(--dorado); }

        .hamburger { display: none; flex-direction: column; cursor: pointer; gap: 6px; }
        .hamburger span { width: 30px; height: 2px; background-color: var(--dorado); }

        /* CONTENEDOR PRINCIPAL */
        .main-container {
            min-height: 100vh; padding: 140px 20px 60px;
            background: linear-gradient(rgba(15,15,15,0.85), rgba(15,15,15,0.85)), url('Maestro 7 Disponibilidad.png') center/cover no-repeat fixed;
            display: flex; flex-direction: column; align-items: center;
        }

        /* NAVEGACIÓN DE MESES */
        .month-nav { display: flex; gap: 10px; margin-bottom: 35px; flex-wrap: wrap; justify-content: center; border-bottom: 1px solid rgba(197, 160, 89, 0.2); padding-bottom: 20px; width: 100%; max-width: 900px; }
        .month-item { color: var(--blanco); text-decoration: none; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; transition: 0.3s; padding: 8px 12px; cursor: pointer; opacity: 0.5; }
        .month-item.active { color: var(--dorado); border-bottom: 1px solid var(--dorado); opacity: 1; }

        /* CAJA DEL CALENDARIO */
        .calendar-box { background: rgba(0, 0, 0, 0.65); backdrop-filter: blur(15px); border: 1px solid rgba(197, 160, 89, 0.25); padding: 40px; border-radius: 4px; max-width: 900px; width: 100%; box-sizing: border-box; }
        
        .title-cal { font-family: var(--font-serif); color: var(--dorado); font-size: 2.2rem; margin: 0; text-transform: uppercase; letter-spacing: 5px; text-align: center; }
        .subtitle { font-size: 0.7rem; letter-spacing: 4px; text-transform: uppercase; color: #888; text-align: center; margin-bottom: 40px; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .day-header { text-align: center; color: var(--dorado); font-size: 0.75rem; font-weight: bold; padding-bottom: 15px; border-bottom: 1px solid rgba(197, 160, 89, 0.1); text-transform: uppercase; }
        
        .day { aspect-ratio: 1.2; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(197,160,89,0.1); cursor: pointer; color: var(--dorado); transition: 0.3s; font-size: 1rem; position: relative; }
        .day.occupied { background: rgba(197, 160, 89, 0.25); border: 1px solid var(--dorado); font-weight: bold; }
        .day.occupied::after { content: '•'; font-size: 1.5rem; position: absolute; bottom: 2px; }
        .day:hover { background: var(--dorado); color: var(--oscuro); font-weight: bold; }

        /* MODAL */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--oscuro); border: 1px solid var(--dorado); padding: 40px; width: 100%; max-width: 450px; position: relative; text-align: center; }
        
        input, select { background: transparent; border: none; border-bottom: 1px solid var(--dorado); padding: 12px; color: var(--blanco); width: 100%; margin-bottom: 20px; font-family: var(--font-sans); outline: none; box-sizing: border-box; }
        .btn-send { background: var(--dorado); color: var(--oscuro); border: none; padding: 18px; width: 100%; font-family: var(--font-serif); font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .btn-send:hover { background: #e0b86d; }

        @media (max-width: 768px) {
            header { padding: 20px 30px; }
            .nav-menu { display: none; }
            .hamburger { display: flex; }
            .nav-menu.active { display: flex; position: fixed; top: 70px; left: 0; width: 100%; flex-direction: column; background: rgba(15,15,15,0.98); padding: 40px 0; border-bottom: 1px solid var(--dorado); text-align: center; }
            .calendar-box { padding: 20px 10px; }
            .title-cal { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">MARCO IVÁN CABRERA</a>
    <div class="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></div>
    <nav class="nav-menu" id="navMenu">
        <a href="index.html">Servicios</a>
        <a href="disponibilidad.html">Disponibilidad</a>
        <a href="https://wa.me/51930046681">Reservas</a>
    </nav>
</header>

<div class="main-container">
    <nav class="month-nav" id="monthNav"></nav>
    <div class="calendar-box">
        <h1 class="title-cal">Agenda de Gala</h1>
        <p class="subtitle">Disponibilidad Protocolar | Marco Iván Cabrera</p>
        <div class="calendar-grid" id="calendarGrid"></div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <span onclick="closeModal()" style="position:absolute; top:15px; right:20px; color:var(--dorado); cursor:pointer; font-size:30px;">&times;</span>
        <h3 id="modalDate" style="font-family:var(--font-serif); color:var(--dorado); letter-spacing:2px; margin-bottom: 10px;"></h3>
        <div id="statusInfo" style="margin-bottom: 25px; font-size: 0.9rem;"></div>
        
        <form id="wspForm">
            <input type="text" id="c_nombre" placeholder="SU NOMBRE COMPLETO" required>
            <select id="c_evento" required>
                <option value="" disabled selected>TIPO DE EVENTO</option>
                <option value="Matrimonio">Matrimonio</option>
                <option value="Quinceaños">Quinceaños</option>
                <option value="Protocolo">Protocolo / Corporativo</option>
            </select>
            <button type="button" class="btn-send" onclick="enviarWhatsApp()">SOLICITAR PROTOCOLO</button>
        </form>
    </div>
</div>

<script>
    // PASO 3: Aquí pegaremos el enlace de tu Google Sheets
    const SHEETS_CSV = 'TU_URL_DE_GOOGLE_SHEETS_AQUÍ';
    let agendaData = {};

    const months = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
    let currentMonth = new Date().getMonth();
    let currentYear = 2026;

    function toggleMenu() { document.getElementById('navMenu').classList.toggle('active'); }

    async function loadData() {
        try {
            const res = await fetch(SHEETS_CSV);
            const text = await res.text();
            const rows = text.split('\n').slice(1);
            rows.forEach(r => {
                const cols = r.split(',');
                if(cols[0]) agendaData[cols[0].trim()] = { hora: cols[2], tipo: cols[3] };
            });
            render();
        } catch(e) { render(); }
    }

    function renderMonthNav() {
        const nav = document.getElementById('monthNav');
        nav.innerHTML = '';
        months.forEach((m, i) => {
            const btn = document.createElement('a');
            btn.className = `month-item ${i === currentMonth ? 'active' : ''}`;
            btn.innerText = m.substring(0, 3);
            btn.onclick = () => { currentMonth = i; render(); renderMonthNav(); };
            nav.appendChild(btn);
        });
    }

    function render() {
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';
        ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'].forEach(h => {
            grid.innerHTML += `<div class="day-header">${h}</div>`;
        });

        const first = (new Date(currentYear, currentMonth, 1).getDay() || 7) - 1;
        const total = new Date(currentYear, currentMonth + 1, 0).getDate();

        for(let i=0; i<first; i++) grid.innerHTML += `<div class="day" style="border:none; cursor:default"></div>`;

        for(let i=1; i<=total; i++) {
            const key = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            const isOcup = agendaData[key];
            const div = document.createElement('div');
            div.className = `day ${isOcup ? 'occupied' : ''}`;
            div.innerText = i;
            div.onclick = () => openModal(i, months[currentMonth], currentYear, isOcup);
            grid.appendChild(div);
        }
    }

    function openModal(day, month, year, data) {
        const fecha = `${day} DE ${month.toUpperCase()} ${year}`;
        document.getElementById('modalDate').innerText = fecha;
        const info = document.getElementById('statusInfo');
        
        if(data) {
            info.innerHTML = `<p style="color:var(--dorado); font-weight:bold;">FECHA RESERVADA - EVENTO A LAS ${data.hora}</p>`;
        } else {
            info.innerHTML = `<p style="color:#25d366;">FECHA DISPONIBLE</p>`;
        }
        document.getElementById('modal').style.display = 'flex';
    }

    function enviarWhatsApp() {
        const nombre = document.getElementById('c_nombre').value.toUpperCase();
        const evento = document.getElementById('c_evento').value;
        const fecha = document.getElementById('modalDate').innerText;
        if(!nombre || !evento) return alert("Por favor, complete sus datos.");
        
        const msg = `*SOLICITUD DE PROTOCOLO*%0A*CLIENTE:* ${nombre}%0A*FECHA:* ${fecha}%0A*EVENTO:* ${evento}`;
        window.open(`https://wa.me/51930046681?text=${msg}`, '_blank');
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    
    renderMonthNav();
    loadData();
</script>
</body>
</html>
