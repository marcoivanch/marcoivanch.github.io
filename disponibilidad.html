<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario de Gala | Marco Iván Cabrera</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --dorado: #c5a059;
            --oscuro-puro: #0a0a0a;
            --blanco-marfil: #fdfcfb;
            --whatsapp-verde: #25d366;
            --font-serif: 'Cinzel', serif;
            --font-sans: 'Montserrat', sans-serif;
        }

        body, html { margin: 0; padding: 0; min-height: 100%; background-color: var(--oscuro-puro); font-family: var(--font-sans); color: var(--blanco-marfil); overflow-x: hidden; }

        /* --- FONDO DINÁMICO (EFECTO REVELADO) --- */
        .main-container {
            min-height: 100vh;
            /* Imagen de fondo basada en tu evento real */
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                        url('Maestro 7 Disponibilidad.png') center/cover no-repeat fixed;
            filter: grayscale(100%);
            transition: 1s ease;
            display: flex; flex-direction: column; align-items: center; padding: 40px 20px;
            box-sizing: border-box;
        }

        .main-container:hover {
            filter: grayscale(0%);
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), 
                        url('Maestro 7 Disponibilidad.png') center/cover no-repeat fixed;
        }

        /* --- NAVEGACIÓN DE MESES (NEGRILLAS E ILUMINACIÓN) --- */
        .month-nav {
            display: flex; gap: 12px; margin-bottom: 35px; flex-wrap: wrap; justify-content: center;
            border-bottom: 2px solid rgba(197, 160, 89, 0.4); padding-bottom: 20px; width: 100%; max-width: 1000px;
        }
        .month-item {
            color: var(--blanco-marfil); /* Letras iluminadas para que se vean */
            text-decoration: none; font-size: 0.85rem; letter-spacing: 2px;
            text-transform: uppercase; transition: 0.3s; padding: 10px 15px; cursor: pointer;
            font-weight: 700; opacity: 0.7;
        }
        .month-item.active { color: var(--dorado); border: 1px solid var(--dorado); background: rgba(197, 160, 89, 0.15); opacity: 1; }
        .month-item:hover:not(.active) { color: var(--dorado); background: rgba(255,255,255,0.1); opacity: 1; }

        /* --- PANEL CALENDARIO (MÁS TRANSPARENTE) --- */
        .calendar-box {
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(197, 160, 89, 0.3);
            padding: 45px; border-radius: 2px;
            max-width: 950px; width: 100%;
            box-shadow: 0 40px 100px rgba(0,0,0,0.9);
        }

        h1 { font-family: var(--font-serif); color: var(--dorado); font-size: 2.8rem; margin: 0; text-transform: uppercase; letter-spacing: 8px; text-align: center; }
        .subtitle { font-size: 0.7rem; letter-spacing: 5px; text-transform: uppercase; color: #ddd; text-align: center; margin-bottom: 45px; }

        .current-month-display { 
            font-family: var(--font-serif); font-size: 1.8rem; color: var(--dorado); 
            text-align: center; margin-bottom: 30px; letter-spacing: 4px; font-weight: 700;
        }

        /* --- GRID DE FECHAS --- */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; }
        .day-header { font-weight: 700; color: var(--dorado); text-align: center; font-size: 0.75rem; text-transform: uppercase; padding-bottom: 15px; }
        
        .day {
            aspect-ratio: 1.3 / 1; display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(197, 160, 89, 0.25); cursor: pointer; transition: 0.3s; font-size: 1rem;
            color: var(--dorado); font-weight: 400;
        }
        .day.empty { border: none; cursor: default; }
        .day.available:hover { background: var(--dorado); color: var(--oscuro-puro); font-weight: 700; transform: scale(1.05); z-index: 10; }
        .day.booked { opacity: 0.15; cursor: not-allowed; background: rgba(255,255,255,0.03); color: #666; }

        /* --- BOTÓN DE RETORNO (CORREGIDO: ALTA VISIBILIDAD) --- */
        .btn-back { 
            margin-top: 50px; 
            text-decoration: none; 
            color: var(--blanco-marfil); /* Ahora es blanco brillante */
            font-size: 0.85rem; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            border: 1px solid rgba(255,255,255,0.3); 
            padding: 12px 25px;
            transition: 0.3s; 
            font-weight: 700;
            background: rgba(0,0,0,0.4);
        }
        .btn-back:hover { 
            color: var(--dorado); 
            border-color: var(--dorado); 
            background: rgba(197, 160, 89, 0.1);
        }

        /* --- WHATSAPP FLOTANTE --- */
        .wsp-float {
            position: fixed; width: 65px; height: 65px; bottom: 30px; right: 30px;
            background-color: var(--whatsapp-verde); color: #FFF; border-radius: 50px;
            text-align: center; z-index: 2000; display: flex; align-items: center;
            justify-content: center; text-decoration: none; transition: 0.3s;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .wsp-float:hover { transform: scale(1.1); background-color: #128c7e; }

        @media (max-width: 768px) {
            h1 { font-size: 1.6rem; letter-spacing: 4px; }
            .calendar-box { padding: 20px; }
            .day { font-size: 0.8rem; aspect-ratio: 1/1; }
            .wsp-float { width: 55px; height: 55px; bottom: 20px; right: 20px; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <nav class="month-nav" id="monthNav"></nav>

        <div class="calendar-box">
            <h1>Calendario de Gala</h1>
            <p class="subtitle">Agenda Oficial | Protocolo y Eventos</p>

            <div id="calendarTitle" class="current-month-display"></div>

            <div class="calendar-grid" id="calendarGrid"></div>
        </div>

        <a href="index.html" class="btn-back">VOLVER AL PORTAL PRINCIPAL</a>
    </div>

    <a href="https://wa.me/51930046681?text=Maestro%20Cabrera,%20solicito%20información%20sobre%20su%20disponibilidad" class="wsp-float" target="_blank">
        <svg fill="#fff" width="38px" height="38px" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
    </a>

    <script>
        const months = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
        let currentMonth = 2; // Inicia en Marzo 2026
        const currentYear = 2026;

        // --- GESTIÓN DE FECHAS OCUPADAS ---
        // Pon aquí tus contratos reales para que el cliente vea que ya estás reservado.
        const fechasOcupadas = [
            "3-18", // Ejemplo: 18 de Abril ocupado
            "4-2",  // Ejemplo: 2 de Mayo ocupado
        ];

        function renderMonthNav() {
            const nav = document.getElementById('monthNav');
            nav.innerHTML = '';
            months.forEach((month, index) => {
                const btn = document.createElement('a');
                btn.className = `month-item ${index === currentMonth ? 'active' : ''}`;
                btn.innerText = month.substring(0, 3);
                btn.onclick = () => {
                    currentMonth = index;
                    renderCalendar();
                    renderMonthNav();
                };
                nav.appendChild(btn);
            });
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const title = document.getElementById('calendarTitle');
            grid.innerHTML = '';
            title.innerText = `${months[currentMonth].toUpperCase()} ${currentYear}`;

            const headers = ['Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb', 'Dom'];
            headers.forEach(h => {
                const div = document.createElement('div');
                div.className = 'day-header';
                div.innerText = h;
                grid.appendChild(div);
            });

            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const startingPoint = firstDay === 0 ? 6 : firstDay - 1;
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

            for (let i = 0; i < startingPoint; i++) {
                const empty = document.createElement('div');
                empty.className = 'day empty';
                grid.appendChild(empty);
            }

            for (let i = 1; i <= daysInMonth; i++) {
                const day = document.createElement('div');
                const fechaKey = `${currentMonth}-${i}`;
                const isBooked = fechasOcupadas.includes(fechaKey);

                day.className = `day ${isBooked ? 'booked' : 'available'}`;
                day.innerText = i;
                
                if(!isBooked) {
                    day.onclick = () => window.open(`https://wa.me/51930046681?text=Maestro%20Cabrera,%20solicito%20informaci%C3%B3n%20para%20el%20día%20${i}%20de%20${months[currentMonth]}`, '_blank');
                }
                grid.appendChild(day);
            }
        }

        renderMonthNav();
        renderCalendar();
    </script>
</body>
</html>
