<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disponibilidad | Marco Iván Cabrera Hernández</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">

    <style>
        :root { --dorado: #c5a059; --oscuro: #0f0f0f; --blanco: #fdfcfb; --font-serif: 'Cinzel', serif; --font-sans: 'Montserrat', sans-serif; }
        body, html { margin: 0; padding: 0; min-height: 100%; background-color: var(--oscuro); font-family: var(--font-sans); color: var(--blanco); overflow-x: hidden; }

        /* HEADER Y MENÚ HAMBURGUESA */
        header { position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; box-sizing: border-box; z-index: 1000; background: rgba(15, 15, 15, 0.95); border-bottom: 1px solid rgba(197, 160, 89, 0.2); }
        .logo { font-family: var(--font-serif); font-size: 1.1rem; color: var(--dorado); text-decoration: none; letter-spacing: 2px; }
        
        .nav-menu { display: none; position: fixed; top: 0; right: 0; height: 100vh; width: 250px; background: var(--oscuro); flex-direction: column; padding: 80px 30px; border-left: 1px solid var(--dorado); z-index: 999; }
        .nav-menu.active { display: flex; }
        .nav-menu a { color: var(--blanco); text-decoration: none; margin: 15px 0; font-family: var(--font-serif); font-size: 1rem; transition: 0.3s; border-bottom: 1px solid transparent; }
        .nav-menu a:hover { color: var(--dorado); border-bottom: 1px solid var(--dorado); }

        .hamburger { cursor: pointer; z-index: 1001; }
        .hamburger div { width: 25px; height: 2px; background: var(--dorado); margin: 6px; transition: 0.4s; }

        /* CONTENEDOR PRINCIPAL */
        .main-container { min-height: 100vh; padding: 120px 10px 60px; background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('Maestro 7 Disponibilidad.png') center/cover no-repeat fixed; display: flex; justify-content: center; }
        .calendar-box { background: rgba(0,0,0,0.7); backdrop-filter: blur(15px); border: 1px solid rgba(197, 160, 89, 0.3); padding: 25px; border-radius: 4px; width: 100%; max-width: 1100px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }

        /* NAVEGACIÓN DE MESES */
        .calendar-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid rgba(197, 160, 89, 0.1); padding-bottom: 20px; }
        .calendar-nav button { background: transparent; border: 1px solid var(--dorado); color: var(--dorado); padding: 10px 20px; cursor: pointer; font-family: var(--font-serif); font-weight: bold; letter-spacing: 1px; transition: 0.3s; }
        .calendar-nav button:hover { background: var(--dorado); color: var(--oscuro); }
        #monthDisplay { font-family: var(--font-serif); font-size: 1.8rem; color: var(--dorado); letter-spacing: 4px; text-transform: uppercase; text-align: center; }

        /* GRID DEL CALENDARIO - DINÁMICO */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .day-header { text-align: center; color: var(--dorado); font-size: 0.8rem; font-weight: bold; text-transform: uppercase; padding-bottom: 15px; border-bottom: 1px solid rgba(197, 160, 89, 0.1); }
        
        .day { min-height: 120px; border: 1px solid rgba(197, 160, 89, 0.2); display: flex; flex-direction: column; align-items: center; padding: 8px; cursor: pointer; transition: 0.3s; background: rgba(255,255,255,0.02); }
        .day:hover { background: rgba(197, 160, 89, 0.1); border-color: var(--dorado); }
        .day span.day-number { font-size: 1.2rem; color: var(--dorado); margin-bottom: 5px; font-weight: 600; }
        
        /* ESTILO PARA DÍAS CON EVENTO - VISIBILIDAD TOTAL */
        .day.ocupado { background: rgba(197, 160, 89, 0.08); border: 1px solid var(--dorado); }
        .event-list { width: 100%; display: flex; flex-direction: column; gap: 4px; }
        .event-item { font-size: 0.65rem; background: rgba(197, 160, 89, 0.15); padding: 4px; border-radius: 2px; color: #fff; line-height: 1.2; border-left: 2px solid var(--dorado); }
        .ev-time { color: var(--dorado); font-weight: bold; display: block; font-size: 0.7rem; }
        .ev-client { font-style: italic; color: #ddd; display: block; margin: 2px 0; }
        .ev-type { text-transform: uppercase; font-weight: 600; font-size: 0.6rem; letter-spacing: 0.5px; }

        /* MODAL */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: var(--oscuro); border: 1px solid var(--dorado); padding: 30px; width: 90%; max-width: 500px; position: relative; box-shadow: 0 0 30px var(--dorado); }
        
        input, select { background: transparent; border: none; border-bottom: 1px solid rgba(197, 160, 89, 0.5); padding: 12px; color: #fff; width: 100%; margin-bottom: 20px; outline: none; font-family: var(--font-sans); }
        select option { background: #1a1a1a; color: var(--dorado); }
        .btn-reserva { background: var(--dorado); color: var(--oscuro); border: none; padding: 18px; width: 100%; font-weight: bold; cursor: pointer; text-transform: uppercase; font-family: var(--font-serif); letter-spacing: 2px; }

        @media (max-width: 850px) {
            .calendar-grid { grid-template-columns: repeat(2, 1fr); }
            .day { min-height: auto; padding: 15px; }
            .calendar-nav button { padding: 8px 10px; font-size: 0.7rem; }
            #monthDisplay { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">MARCO IVÁN CABRERA</a>
        <div class="hamburger" onclick="toggleMenu()">
            <div></div><div></div><div></div>
        </div>
    </header>

    <nav class="nav-menu" id="navMenu">
        <a href="index.html">INICIO</a>
        <a href="servicios.html">SERVICIOS</a>
        <a href="disponibilidad.html" style="color:var(--dorado)">DISPONIBILIDAD</a>
        <a href="contacto.html">CONTACTO</a>
    </nav>

    <div class="main-container">
        <div class="calendar-box">
            <div class="calendar-nav">
                <button onclick="changeMonth(-1)">&#10094; ANTERIOR</button>
                <div id="monthDisplay"></div>
                <button onclick="changeMonth(1)">SIGUIENTE &#10095;</button>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
        </div>
    </div>

    <div id="reservaModal" class="modal">
        <div class="modal-content">
            <span onclick="closeModal()" style="position:absolute; top:10px; right:15px; cursor:pointer; color:var(--dorado); font-size:28px;">&times;</span>
            <h2 id="modalDate" style="color:var(--dorado); text-align:center; font-family:var(--font-serif); margin-bottom:20px;"></h2>
            <form id="formWsp">
                <input type="text" id="m_nombre" placeholder="SU NOMBRE COMPLETO" required>
                <select id="m_evento">
                    <option value="Quinceaños">Quinceaños</option>
                    <option value="Matrimonio">Matrimonio</option>
                    <option value="Protocolo Institucional">Protocolo Institucional</option>
                    <option value="Bautizo">Bautizo</option>
                </select>
                <button type="button" class="btn-reserva" onclick="enviarWsp()">Consultar Disponibilidad</button>
            </form>
        </div>
    </div>

    <script>
        let currentDate = new Date(2026, 2, 1); // Marzo 2026
        const agenda = {};
        const SHEETS_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT44vHcadOnZWmsp81vJEI096ECp-RgC7DcP2UW1tk0M-tiHFRw-TNHTZhxuSrStliuttBixgihxOFj/pub?output=csv';

        async function fetchAgenda() {
            try {
                const res = await fetch(SHEETS_CSV);
                const csv = await res.text();
                const rows = csv.split('\n').slice(1);
                rows.forEach(r => {
                    const c = r.split(',');
                    if(c[0]) {
                        const f = c[0].trim();
                        if(!agenda[f]) agenda[f] = [];
                        agenda[f].push({ cliente: c[1] || "", hora: c[2] || "", tipo: c[3] || "" });
                    }
                });
                render();
            } catch(e) { render(); }
        }

        function render() {
            const grid = document.getElementById('calendarGrid');
            const display = document.getElementById('monthDisplay');
            grid.innerHTML = '';
            
            const meses = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
            display.innerText = `${meses[currentDate.getMonth()]} ${currentDate.getFullYear()}`;

            const headers = ["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"];
            headers.forEach(h => grid.innerHTML += `<div class="day-header">${h}</div>`);

            const firstDay = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1).getDay();
            const startPad = (firstDay === 0) ? 6 : firstDay - 1;
            const daysInMonth = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0).getDate();

            for(let i=0; i<startPad; i++) grid.innerHTML += `<div class="day-empty"></div>`;

            for(let d=1; d<=daysInMonth; d++) {
                const dPadded = d.toString().padStart(2,'0');
                const mPadded = (currentDate.getMonth()+1).toString().padStart(2,'0');
                const fDada = `${dPadded}/${mPadded}/${currentDate.getFullYear()}`;
                const fIso = `${currentDate.getFullYear()}-${mPadded}-${dPadded}`;
                
                const evs = agenda[fDada] || agenda[fIso];
                const dayDiv = document.createElement('div');
                dayDiv.className = `day ${evs ? 'ocupado' : ''}`;
                
                let inner = `<span class="day-number">${d}</span>`;
                if(evs) {
                    inner += `<div class="event-list">`;
                    evs.forEach(e => {
                        inner += `
                        <div class="event-item">
                            <span class="ev-time">${e.hora}</span>
                            <span class="ev-client">${e.cliente}</span>
                            <span class="ev-type">${e.tipo}</span>
                        </div>`;
                    });
                    inner += `</div>`;
                }
                dayDiv.innerHTML = inner;
                dayDiv.onclick = () => openModal(d);
                grid.appendChild(dayDiv);
            }
        }

        function changeMonth(dir) { currentDate.setMonth(currentDate.getMonth() + dir); render(); }
        function toggleMenu() { document.getElementById('navMenu').classList.toggle('active'); }
        function openModal(d) { 
            const meses = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
            document.getElementById('modalDate').innerText = `${d} de ${meses[currentDate.getMonth()]} de ${currentDate.getFullYear()}`;
            document.getElementById('reservaModal').style.display = 'flex'; 
        }
        function closeModal() { document.getElementById('reservaModal').style.display = 'none'; }
        
        function enviarWsp() {
            const nombre = document.getElementById('m_nombre').value;
            const evento = document.getElementById('m_evento').value;
            const fecha = document.getElementById('modalDate').innerText;
            if(!nombre) { alert("Por favor, ingrese su nombre"); return; }
            const msg = `*SOLICITUD DE PROTOCOLO*%0A*FECHA:* ${fecha}%0A*CLIENTE:* ${nombre.toUpperCase()}%0A*EVENTO:* ${evento}`;
            window.open(`https://wa.me/51930046681?text=${msg}`, '_blank');
        }

        fetchAgenda();
    </script>
</body>
</html>
