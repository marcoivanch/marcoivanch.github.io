<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disponibilidad | Marco Iván Cabrera Hernández</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --dorado: #c5a059;
            --oscuro: #0f0f0f;
            --blanco: #fdfcfb;
            --font-serif: 'Cinzel', serif;
            --font-sans: 'Montserrat', sans-serif;
        }

        body, html { margin: 0; padding: 0; min-height: 100%; background-color: var(--oscuro); font-family: var(--font-sans); color: var(--blanco); overflow-x: hidden; }

        header {
            position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center;
            padding: 25px 80px; box-sizing: border-box; z-index: 1000; background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(12px); border-bottom: 1px solid rgba(197, 160, 89, 0.2);
        }

        .logo { font-family: var(--font-serif); font-size: 1.1rem; letter-spacing: 3px; color: var(--dorado); text-transform: uppercase; text-decoration: none; }
        .nav-menu { display: flex; gap: 40px; }
        .nav-menu a { color: var(--blanco); text-decoration: none; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .nav-menu a:hover { color: var(--dorado); }

        .hamburger { display: none; flex-direction: column; cursor: pointer; gap: 6px; }
        .hamburger span { width: 30px; height: 2px; background-color: var(--dorado); }

        .main-container {
            min-height: 100vh; padding: 140px 20px 60px;
            background: linear-gradient(rgba(15,15,15,0.85), rgba(15,15,15,0.85)), url('Maestro 7 Disponibilidad.png') center/cover no-repeat fixed;
            display: flex; flex-direction: column; align-items: center;
        }

        .calendar-box { background: rgba(0, 0, 0, 0.65); backdrop-filter: blur(15px); border: 1px solid rgba(197, 160, 89, 0.25); padding: 40px; border-radius: 4px; max-width: 900px; width: 100%; box-sizing: border-box; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin-top: 20px; }
        .day-header { text-align: center; color: var(--dorado); font-size: 0.75rem; font-weight: bold; padding-bottom: 15px; border-bottom: 1px solid rgba(197, 160, 89, 0.1); }
        
        .day { aspect-ratio: 1.2; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid rgba(197,160,89,0.1); cursor: pointer; color: var(--dorado); transition: 0.3s; font-size: 1rem; position: relative; }
        .day.occupied { background: rgba(197, 160, 89, 0.25); border: 1px solid var(--dorado); font-weight: bold; }
        .day.occupied::after { content: '•'; font-size: 1.5rem; position: absolute; bottom: 2px; }
        .day:hover { background: var(--dorado); color: var(--oscuro); }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--oscuro); border: 1px solid var(--dorado); padding: 40px; width: 100%; max-width: 450px; position: relative; }
        
        input, select { background: transparent; border: none; border-bottom: 1px solid var(--dorado); padding: 12px; color: var(--blanco); width: 100%; margin-bottom: 20px; font-family: var(--font-sans); }
        .btn-send { background: var(--dorado); color: var(--oscuro); border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }

        @media (max-width: 768px) {
            header { padding: 20px 30px; }
            .nav-menu { display: none; }
            .hamburger { display: flex; }
            .nav-menu.active { display: flex; position: fixed; top: 70px; left: 0; width: 100%; flex-direction: column; background: rgba(15,15,15,0.98); padding: 40px 0; border-bottom: 1px solid var(--dorado); }
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">MARCO IVÁN CABRERA</a>
    <div class="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></div>
    <nav class="nav-menu" id="navMenu">
        <a href="index.html">Servicios</a>
        <a href="disponibilidad.html">Disponibilidad</a>
        <a href="https://wa.me/51930046681">Reservas</a>
    </nav>
</header>

<div class="main-container">
    <div class="calendar-box">
        <h2 id="mesTitulo" style="font-family: var(--font-serif); color: var(--dorado); text-align: center; letter-spacing: 4px; margin: 0 0 30px; text-transform: uppercase;"></h2>
        <div class="calendar-grid" id="calendarGrid"></div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <span onclick="closeModal()" style="position:absolute; top:15px; right:20px; color:var(--dorado); cursor:pointer; font-size:30px;">&times;</span>
        <h3 id="modalDate" style="font-family:var(--font-serif); color:var(--dorado); letter-spacing:2px; text-align:center;"></h3>
        
        <div id="eventStatus" style="margin-bottom: 20px;"></div>

        <form id="wspForm">
            <input type="text" id="c_nombre" placeholder="SU NOMBRE" required>
            <select id="c_evento" required>
                <option value="" disabled selected>TIPO DE EVENTO</option>
                <option value="Matrimonio">Matrimonio</option>
                <option value="Quinceaños">Quinceaños</option>
                <option value="Corporativo">Protocolo / Corporativo</option>
            </select>
            <button type="button" class="btn-send" onclick="enviarSolicitud()">SOLICITAR DISPONIBILIDAD</button>
        </form>
    </div>
</div>

<script>
    // PASO 3: AQUÍ PEGARÁS TU ENLACE DE GOOGLE SHEETS DESPUÉS
    const SHEETS_CSV = 'TU_URL_DE_GOOGLE_SHEETS_AQUÍ';
    let agendaData = {};

    function toggleMenu() { document.getElementById('navMenu').classList.toggle('active'); }

    async function loadAgenda() {
        try {
            const res = await fetch(SHEETS_CSV);
            const text = await res.text();
            const rows = text.split('\n').slice(1);
            rows.forEach(r => {
                const cols = r.split(',');
                if(cols[0]) agendaData[cols[0].trim()] = { hora: cols[2], tipo: cols[3] };
            });
            render();
        } catch(e) { render(); }
    }

    function render() {
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';
        const d = new Date();
        const m = d.getMonth(), y = d.getFullYear();
        const months = ["ENERO","FEBRERO","MARZO","ABRIL","MAYO","JUNIO","JULIO","AGOSTO","SEPTIEMBRE","OCTUBRE","NOVIEMBRE","DICIEMBRE"];
        document.getElementById('mesTitulo').innerText = `${months[m]} ${y}`;

        ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'].forEach(h => {
            grid.innerHTML += `<div class="day-header">${h}</div>`;
        });

        const first = (new Date(y, m, 1).getDay() || 7) - 1;
        const total = new Date(y, m + 1, 0).getDate();

        for(let i=0; i<first; i++) grid.innerHTML += `<div class="day" style="border:none; cursor:default"></div>`;

        for(let i=1; i<=total; i++) {
            const key = `${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            const isOcup = agendaData[key];
            const div = document.createElement('div');
            div.className = `day ${isOcup ? 'occupied' : ''}`;
            div.innerText = i;
            div.onclick = () => openModal(i, months[m], y, isOcup);
            grid.appendChild(div);
        }
    }

    function openModal(day, month, year, data) {
        const fechaTexto = `${day} ${month} ${year}`;
        document.getElementById('modalDate').innerText = fechaTexto;
        const status = document.getElementById('eventStatus');
        
        if(data) {
            status.innerHTML = `<p style="color:var(--dorado); text-align:center; font-weight:bold;">ESTA FECHA YA TIENE UN EVENTO A LAS ${data.hora}.<br><small style="color:#888;">Aún puede consultar por otros horarios.</small></p>`;
        } else {
            status.innerHTML = `<p style="color:#25d366; text-align:center;">FECHA DISPONIBLE</p>`;
        }
        document.getElementById('modal').style.display = 'flex';
    }

    function enviarSolicitud() {
        const nombre = document.getElementById('c_nombre').value;
        const evento = document.getElementById('c_evento').value;
        const fecha = document.getElementById('modalDate').innerText;
        
        if(!nombre || !evento) { alert("Por favor complete su nombre y el tipo de evento."); return; }

        const mensaje = `Hola Marco, mi nombre es ${nombre}. Deseo consultar disponibilidad para un ${evento} el día ${fecha}.`;
        window.open(`https://wa.me/51930046681?text=${encodeURIComponent(mensaje)}`, '_blank');
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    loadAgenda();
</script>
</body>
</html>
