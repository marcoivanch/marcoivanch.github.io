<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disponibilidad | Marco Iván Cabrera</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --dorado: #c5a059;
            --oscuro: #0f0f0f;
            --blanco-marfil: #fdfcfb;
            --font-serif: 'Cinzel', serif;
            --font-sans: 'Montserrat', sans-serif;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--oscuro);
            font-family: var(--font-sans);
            color: var(--blanco-marfil);
        }

        /* --- FONDO CON LA IMAGEN EDITADA --- */
        .main-container {
            min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('Maestro 7 Disponibilidad.png') center/cover no-repeat fixed;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 40px 20px; box-sizing: border-box;
        }

        /* --- CONTENEDOR DEL CALENDARIO --- */
        .calendar-box {
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid var(--dorado);
            padding: 40px; border-radius: 4px;
            max-width: 900px; width: 100%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h1 { font-family: var(--font-serif); color: var(--dorado); font-size: 2.5rem; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 3px; }
        .subtitle { font-size: 0.9rem; letter-spacing: 4px; text-transform: uppercase; color: #aaa; margin-bottom: 30px; border-left: 2px solid var(--dorado); padding-left: 15px; }

        .month-label { font-family: var(--font-serif); font-size: 1.5rem; color: var(--dorado); margin-bottom: 20px; text-align: center; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .day-header { font-weight: bold; color: var(--dorado); text-align: center; font-size: 0.7rem; text-transform: uppercase; padding-bottom: 10px; }
        
        .day {
            aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(197, 160, 89, 0.3); cursor: pointer; transition: 0.4s; font-size: 1rem;
        }

        .day.available { color: var(--dorado); border-color: var(--dorado); }
        .day.available:hover { background: var(--dorado); color: var(--oscuro); font-weight: bold; box-shadow: 0 0 15px var(--dorado); }
        
        .day.booked { opacity: 0.2; cursor: not-allowed; background: rgba(255,255,255,0.05); color: #555; }

        /* Botón Volver */
        .btn-back {
            margin-top: 30px; text-decoration: none; color: #aaa; font-size: 0.8rem;
            text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid transparent; transition: 0.3s;
        }
        .btn-back:hover { color: var(--dorado); border-bottom: 1px solid var(--dorado); }

        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; }
            .calendar-box { padding: 20px; }
            .day { font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="calendar-box">
            <h1>Calendario de Gala</h1>
            <p class="subtitle">Gestión de Protocolo | Reservas Oficiales</p>
            
            <div class="month-label">MARZO 2026</div>

            <div class="calendar-grid">
                <div class="day-header">Lun</div><div class="day-header">Mar</div><div class="day-header">Mié</div><div class="day-header">Jue</div><div class="day-header">Vie</div><div class="day-header">Sáb</div><div class="day-header">Dom</div>
                
                <div class="day booked">1</div>
                <div class="day available">2</div><div class="day available">3</div><div class="day available">4</div><div class="day available">5</div><div class="day available">6</div><div class="day available">7</div><div class="day available">8</div>
                <div class="day booked">9</div><div class="day available">10</div><div class="day available">11</div><div class="day available">12</div><div class="day available">13</div><div class="day available">14</div><div class="day available">15</div>
                <div class="day available">16</div><div class="day available">17</div><div class="day available">18</div><div class="day available">19</div><div class="day available">20</div><div class="day booked">21</div><div class="day available">22</div>
                <div class="day available">23</div><div class="day available">24</div><div class="day available">25</div><div class="day available">26</div><div class="day available">27</div><div class="day available">28</div><div class="day available">29</div>
                <div class="day available">30</div><div class="day available">31</div>
            </div>
            
            <div style="margin-top: 25px; text-align: center; font-size: 0.75rem; color: #888;">
                * Seleccione una fecha en <span style="color: var(--dorado);">Dorado</span> para iniciar el proceso de reserva.
            </div>
        </div>

        <a href="index.html" class="btn-back">← Volver al Portal Principal</a>
    </div>

</body>
</html>
