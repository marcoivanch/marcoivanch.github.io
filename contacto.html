<html lang="es">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Marco Iván Cabrera Hernández</title>

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        :root { 
            --dorado: #c5a059; 
            --oscuro: #0f0f0f; 
            --blanco: #fdfcfb; 
            --whatsapp: #25d366;
            --font-serif: 'Cinzel', serif; 
            --font-sans: 'Montserrat', sans-serif;
            --font-gala: 'Playfair Display', serif;
        }

        body, html { margin: 0; padding: 0; height: 100%; background-color: var(--oscuro); font-family: var(--font-sans); color: var(--blanco); overflow-x: hidden; }

        header { 
            position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; 
            padding: 25px 80px; box-sizing: border-box; z-index: 1000; background: rgba(15, 15, 15, 0.95); 
            backdrop-filter: blur(12px); border-bottom: 1px solid rgba(197, 160, 89, 0.3); 
        }
        .logo { font-family: var(--font-serif); font-size: 1.2rem; letter-spacing: 3px; color: var(--dorado); text-transform: uppercase; text-decoration: none; }
        
        .hamburger { cursor: pointer; z-index: 1001; display: block; }
        .hamburger div { width: 30px; height: 2px; background: var(--dorado); margin: 7px; transition: 0.4s; }

        .nav-menu { 
            position: fixed; top: 0; right: -100%; height: 100vh; width: 300px; background: var(--oscuro); 
            display: flex; flex-direction: column; padding: 100px 40px; border-left: 1px solid var(--dorado); 
            transition: 0.5s; z-index: 999; 
        }
        .nav-menu.active { right: 0; }
        .nav-menu a { color: var(--blanco); text-decoration: none; margin: 20px 0; font-family: var(--font-serif); font-size: 1.1rem; letter-spacing: 2px; transition: 0.3s; }
        .nav-menu a:hover { color: var(--dorado); padding-left: 10px; }

        .main-container { 
            min-height: 100vh; padding: 160px 20px 60px; 
            background: linear-gradient(rgba(0,0,0,0.92), rgba(0,0,0,0.92)), url('Maestro 7 Disponibilidad.png') center/cover no-repeat fixed; 
            display: flex; flex-direction: column; align-items: center; box-sizing: border-box;
        }

        .seccion-contacto { max-width: 1100px; width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 60px; }
        .info-despacho h1 { font-family: var(--font-gala); color: var(--dorado); font-size: 3.5rem; font-style: italic; margin: 0 0 20px 0; letter-spacing: -1px; }
        .linea-decorativa { width: 80px; height: 1px; background: var(--dorado); margin-bottom: 35px; opacity: 0.6; }
        .info-despacho p { line-height: 2; font-weight: 200; color: #eee; margin-bottom: 40px; letter-spacing: 1px; font-size: 0.95rem; }
        
        .dato-contacto { margin-bottom: 30px; }
        .dato-contacto label { color: var(--dorado); font-family: var(--font-serif); font-size: 0.75rem; letter-spacing: 3px; display: block; margin-bottom: 8px; opacity: 0.8; }
        .dato-contacto a { font-weight: 400; font-size: 1.1rem; letter-spacing: 1px; color: var(--blanco); text-decoration: none; transition: 0.3s; }
        .dato-contacto a:hover { color: var(--dorado); }

        .formulario-contacto { background: rgba(255,255,255,0.02); border: 1px solid rgba(197, 160, 89, 0.2); padding: 50px; backdrop-filter: blur(15px); }
        .formulario-contacto input, .formulario-contacto textarea { 
            background: transparent; border: none; border-bottom: 1px solid rgba(197, 160, 89, 0.3); 
            width: 100%; padding: 15px 5px; color: #fff; margin-bottom: 30px; outline: none; font-family: var(--font-sans);
        }
        .formulario-contacto textarea { min-height: 120px; resize: none; }
        
        .btn-enviar { 
            background: var(--dorado); color: var(--oscuro); border: none; width: 100%; padding: 22px; 
            font-family: var(--font-serif); letter-spacing: 4px; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase;
        }
        .btn-enviar:hover { background: var(--blanco); transform: translateY(-2px); }
