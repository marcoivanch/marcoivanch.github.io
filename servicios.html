<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servicios | Marco Iván Cabrera Hernández</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">

    <style>
        :root { 
            --dorado: #c5a059; 
            --oscuro: #0f0f0f; 
            --blanco: #fdfcfb; 
            --font-serif: 'Cinzel', serif; 
            --font-sans: 'Montserrat', sans-serif; 
        }

        body, html { 
            margin: 0; padding: 0; min-height: 100%; 
            background-color: var(--oscuro); 
            font-family: var(--font-sans); 
            color: var(--blanco); 
            overflow-x: hidden; 
        }

        /* HEADER */
        header { 
            position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; 
            padding: 25px 80px; box-sizing: border-box; z-index: 1000; background: rgba(15, 15, 15, 0.95); 
            backdrop-filter: blur(12px); border-bottom: 1px solid rgba(197, 160, 89, 0.3); 
        }
        .logo { font-family: var(--font-serif); font-size: 1.2rem; letter-spacing: 3px; color: var(--dorado); text-transform: uppercase; text-decoration: none; }
        
        .hamburger { cursor: pointer; z-index: 1001; }
        .hamburger div { width: 30px; height: 2px; background: var(--dorado); margin: 7px; transition: 0.4s; }

        /* MENÚ NAV */
        .nav-menu { 
            position: fixed; top: 0; right: -100%; height: 100vh; width: 300px; background: var(--oscuro); 
            display: flex; flex-direction: column; padding: 100px 40px; border-left: 1px solid var(--dorado); 
            transition: 0.5s; z-index: 999; 
        }
        .nav-menu.active { right: 0; }
        .nav-menu a { color: var(--blanco); text-decoration: none; margin: 20px 0; font-family: var(--font-serif); font-size: 1.1rem; letter-spacing: 2px; }

        /* CONTENEDOR PRINCIPAL CON LA FOTO DE FONDO */
        .servicios-hero {
            position: relative;
            min-height: 100vh;
            width: 100%;
            background: url('quince.jpg') center/cover no-repeat fixed; /* AQUÍ ESTÁ TU FOTO */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 120px 20px 60px;
            box-sizing: border-box;
        }

        /* Overlay ligero sobre toda la foto para mejorar legibilidad del header */
        .servicios-hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3); /* Oscurecimiento sutil general */
            z-index: 1;
        }

        .content-wrapper { position: relative; z-index: 2; width: 100%; max-width: 1200px; }

        .title-section { text-align: center; margin-bottom: 50px; position: relative; z-index: 2; }
        .title-section h1 { 
            font-family: var(--font-serif); font-size: 3rem; color: var(--dorado); 
            letter-spacing: 8px; text-transform: uppercase; margin: 0;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }

        /* GRID DE SERVICIOS - EFECTO POLARIZADO */
        .grid-servicios { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 30px; 
        }

        .card-servicio {
            /* EFECTO POLARIZADO: Fondo oscuro tenue + desenfoque */
            background: rgba(15, 15, 15, 0.7); /* Oscuro tenue tipo polarizado */
            border: 1px solid rgba(197, 160, 89, 0.4);
            padding: 40px; 
            transition: 0.3s;
            /* Efecto de desenfoque de fondo para el polarizado */
            backdrop-filter: blur(5px); /* Desenfoque sutil para el efecto polarizado */
        }
        
        .card-servicio:hover { border-color: var(--dorado); background: rgba(197, 160, 89, 0.1); }
        .card-servicio h2 { font-family: var(--font-serif); color: var(--dorado); font-size: 1.5rem; margin-bottom: 20px; letter-spacing: 2px; text-transform: uppercase; }
        .card-servicio p { line-height: 1.7; color: #bbb; font-size: 0.95rem; margin-bottom: 20px; }
    </style>
</head>
