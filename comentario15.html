<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comentarios | QuinceAños</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --dorado: #f8e4a1;
            --vino-tinto: #660000;
        }
        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background: url('quince 2.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        /* Capa oscura para que el formulario se lea bien */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1;
        }
        .form-container {
            position: relative;
            z-index: 2;
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border: 1px solid var(--dorado);
            max-width: 500px;
            width: 90%;
            text-align: center;
        }
        h2 { font-family: 'Cinzel', serif; color: var(--dorado); margin-bottom: 20px; }
        p { font-size: 0.9rem; line-height: 1.6; margin-bottom: 25px; }
        
        .field { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 5px; color: var(--dorado); font-size: 0.8rem; text-transform: uppercase; }
        
        input[type="text"], textarea {
            width: 100%;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(248, 228, 161, 0.3);
            color: white;
            box-sizing: border-box;
        }
        
        input[type="file"] { color: var(--dorado); font-size: 0.8rem; }

        .btn-enviar {
            background: var(--vino-tinto);
            color: white;
            border: 1px solid var(--dorado);
            padding: 15px 40px;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            letter-spacing: 2px;
            transition: 0.3s;
        }
        .btn-enviar:hover { background: var(--dorado); color: black; }
    </style>
</head>
<body>
    <div class="overlay"></div>
    
    <div class="form-container">
        <h2>Déjanos tu Comentario</h2>
        <p>Invito a mis clientes a dejar un comentario sobre mis servicios y cómo pasaron la ceremonia conmigo. Les quedaré muy agradecido porque orientará a quienes desean animarse a que les anime su ceremonia.</p>
        
        <form action="#" method="POST" enctype="multipart/form-data">
            <div class="field">
                <label>Nombre de la Quinceañera</label>
                <input type="text" name="nombre_quinceanera" placeholder="Escribe el nombre aquí..." required>
            </div>
            
            <div class="field">
                <label>Tu Comentario</label>
                <textarea name="comentario" rows="5" placeholder="Cuéntanos tu experiencia..." required></textarea>
            </div>
            
            <div class="field">
                <label>Sube una fotografía del evento</label>
                <input type="file" name="foto" accept="image/*">
            </div>
            
            <button type="submit" class="btn-enviar">ENVIAR COMENTARIO</button>
        </form>
    </div>
</body>
</html>
