<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muro de Recuerdos | QuinceAños</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --dorado: #f8e4a1;
            --vino-tinto: #660000;
        }

        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background: url('quince 2.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            min-height: 100vh;
        }

        /* --- VITRINA TOTALMENTE TRANSPARENTE --- */
        .vitrina-container {
            padding: 150px 20px 100px 20px;
            max-width: 800px;
            margin: auto;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .tarjeta-comentario {
            background: rgba(0, 0, 0, 0.2); /* Fondo casi invisible */
            border-left: 3px solid var(--dorado);
            display: flex;
            align-items: center;
            padding: 15px;
            gap: 20px;
            backdrop-filter: blur(2px); /* Desenfoque mínimo para no tapar tu cara */
            animation: fadeIn 1s ease;
        }

        .foto-cliente {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid var(--dorado);
            flex-shrink: 0;
        }

        .info-comentario { flex-grow: 1; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        .nombre-15 { font-family: 'Cinzel', serif; color: var(--dorado); font-size: 1rem; }
        .texto-comentario { font-style: italic; font-size: 0.95rem; line-height: 1.4; color: #fff; }

        /* --- BOTÓN ESCRIBIR --- */
        .btn-abrir-form {
            position: fixed;
            top: 25px;
            right: 85px;
            background: var(--vino-tinto);
            color: white;
            border: 1px solid var(--dorado);
            padding: 10px 20px;
            font-family: 'Cinzel';
            cursor: pointer;
            z-index: 1000;
        }

        /* --- MODAL --- */
        .modal-form {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #000;
            border: 1px solid var(--dorado);
            padding: 30px;
            width: 90%;
            max-width: 400px;
        }

        input, textarea {
            width: 100%; margin-bottom: 15px; padding: 10px;
            background: #111; border: 1px solid #333; color: white; box-sizing: border-box;
        }

        .btn-enviar {
            width: 100%; padding: 15px; background: var(--vino-tinto); color: white;
            border: 1px solid var(--dorado); cursor: pointer; font-family: 'Cinzel';
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Menú Hamburguesa */
        .menu-hamburguesa { position: fixed; top: 25px; right: 25px; z-index: 1500; cursor: pointer; background: rgba(0,0,0,0.5); padding: 8px; border: 1px solid var(--dorado); }
        .linea { width: 22px; height: 2px; background: var(--dorado); margin: 4px 0; }
    </style>
</head>
<body>

    <button class="btn-abrir-form" onclick="abrirModal()">
        <i class="fas fa-edit"></i> ESCRIBIR MI COMENTARIO
    </button>

    <div class="menu-hamburguesa" onclick="toggleMenu()">
        <div class="linea"></div><div class="linea"></div><div class="linea"></div>
    </div>

    <div class="vitrina-container">
        </div>

    <div id="modalComentario" class="modal-form">
        <div class="modal-content">
            <h2 style="font-family: 'Cinzel'; color: var(--dorado); margin-top:0;">Tu Comentario</h2>
            <form action="mailto:tu-correo@tuservicio.com" method="POST" enctype="multipart/form-data">
                
                <input type="text" name="quinceanera" placeholder="Nombre de la Quinceañera (Obligatorio)" required>
                
                <input type="text" name="telefono" placeholder="Tu Celular (Obligatorio)" required>
                
                <textarea name="mensaje" rows="4" placeholder="Escribe aquí tu comentario (Obligatorio)" required></textarea>
                
                <label style="font-size: 0.7rem; color: var(--dorado);">Foto (Opcional):</label>
                <input type="file" name="foto" accept="image/*">

                <button type="submit" class="btn-enviar">PUBLICAR COMENTARIO</button>
                <p onclick="cerrarModal()" style="cursor:pointer; text-align:center; font-size:0.8rem; color: #888;">Cancelar</p>
            </form>
        </div>
    </div>

    <script>
        function abrirModal() { document.getElementById("modalComentario").style.display = "flex"; }
        function cerrarModal() { document.getElementById("modalComentario").style.display = "none"; }
        function toggleMenu() { /* Aquí va tu lógica de menú */ }
    </script>

</body>
</html>
