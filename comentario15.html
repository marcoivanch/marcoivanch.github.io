<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muro de Recuerdos | Marco Cabrera</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --dorado: #f8e4a1;
            --vino-tinto: #660000;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background: url('quince 2.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            height: 100vh;
            overflow: hidden;
        }

        /* HEADER */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 18px 18px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            gap: 18px;
            z-index: 2000;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(8px);
        }

        .logo {
            font-family: 'Cinzel', serif;
            font-size: 0.85rem;
            letter-spacing: 2px;
            color: var(--dorado);
            text-decoration: none;
            text-transform: uppercase;
        }

        .hamburger {
            cursor: pointer;
        }
        .hamburger div {
            width: 26px;
            height: 2px;
            background: var(--dorado);
            margin: 5px;
        }

        .nav-menu {
            position: fixed;
            top: 0;
            left: -100%;
            height: 100vh;
            width: 240px;
            background: rgba(0,0,0,0.95);
            padding: 120px 40px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            transition: 0.4s;
            z-index: 1999;
        }
        .nav-menu.active { left: 0; }

        .nav-menu a {
            color: white;
            text-decoration: none;
            font-family: 'Cinzel';
            letter-spacing: 2px;
            font-size: 1rem;
        }

        /* BOTÓN REGRESAR */
        .btn-regresar {
            position: fixed;
            bottom: 30px;
            left: 20px;
            padding: 10px 25px;
            border: 1px solid var(--dorado);
            color: var(--dorado);
            background: rgba(0,0,0,0.5);
            text-decoration: none;
            font-family: 'Cinzel';
            letter-spacing: 2px;
            z-index: 2000;
        }

        /* CONTENEDOR DE COMENTARIOS */
        .vitrina-scroll {
            position: absolute;
            top: 160px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 700px;
            height: calc(100vh - 230px);
            overflow-y: auto;
            padding-right: 10px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .vitrina-scroll::-webkit-scrollbar { width: 5px; }
        .vitrina-scroll::-webkit-scrollbar-thumb { background: var(--dorado); }

        .tarjeta {
            background: rgba(0,0,0,0.4);
            border-left: 4px solid var(--dorado);
            padding: 25px;
            backdrop-filter: blur(6px);
        }

        .nombre-15 {
            font-family: 'Cinzel';
            color: var(--dorado);
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .texto-comentario {
            font-style: italic;
            font-size: 1.05rem;
            line-height: 1.6;
        }

        /* BOTÓN ABRIR */
        .btn-abrir {
            position: fixed;
            top: 110px;
            right: 20px;
            background: var(--vino-tinto);
            color: white;
            border: 1px solid var(--dorado);
            padding: 10px 18px;
            font-family: 'Cinzel';
            cursor: pointer;
            z-index: 2000;
        }

        /* WHATSAPP FLOTANTE */
        .whatsapp {
            position: fixed;
            bottom: 30px;
            right: 25px;
            background: #25D366;
            color: white;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            text-decoration: none;
            z-index: 3000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 3000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #000;
            border: 1px solid var(--dorado);
            padding: 30px;
            width: 90%;
            max-width: 400px;
        }

        input, textarea {
            width: 100%;
            margin-bottom: 15px;
            padding: 12px;
            background: #111;
            border: 1px solid #444;
            color: white;
        }

        .btn-enviar {
            width: 100%;
            padding: 15px;
            background: var(--vino-tinto);
            color: white;
            border: 1px solid var(--dorado);
            font-family: 'Cinzel';
        }

        /* RESPONSIVE */
        @media (max-width: 480px) {
            .btn-abrir {
                top: 125px;
                right: 15px;
            }
            .vitrina-scroll {
                top: 185px;
            }
        }
    </style>
</head>

<body>

<header>
    <a href="index.html" class="logo">Marco Iván Cabrera Hernández</a>

    <div class="hamburger" onclick="toggleMenu()">
        <div></div><div></div><div></div>
    </div>
</header>

<nav class="nav-menu" id="navMenu">
    <a href="index.html">INICIO</a>
    <a href="servicios.html">SERVICIOS</a>
    <a href="disponibilidad.html">DISPONIBILIDAD</a>
    <a href="contacto.html">CONTACTO</a>
</nav>

<a href="opciones.html" class="btn-regresar">Regresar</a>

<button class="btn-abrir" onclick="abrir()"><i class="fas fa-pen-fancy"></i> ESCRIBIR COMENTARIO</button>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/51936800271" target="_blank">
    <i class="fab fa-whatsapp"></i>
</a>

<div id="muro" class="vitrina-scroll">
    <p style="text-align:center; color:var(--dorado); margin-top: 50px;">Cargando testimonios de éxito...</p>
</div>

<div id="miModal" class="modal">
    <div class="modal-content">
        <h2 style="font-family:'Cinzel'; color:var(--dorado); margin-top:0;">Cuéntanos tu Experiencia</h2>
        <input type="text" id="q" placeholder="Nombre de la Quinceañera" required>
        <input type="text" id="t" placeholder="Tu Celular" required>
        <textarea id="m" rows="4" placeholder="Tu mensaje..." required></textarea>
        <button class="btn-enviar" id="btnPub" onclick="guardar()">PUBLICAR COMENTARIO</button>
        <p onclick="cerrar()" style="text-align:center; cursor:pointer; color:#777; font-size:0.8rem; margin-top:15px;">Volver</p>
    </div>
</div>

<script>
function toggleMenu() {
    document.getElementById('navMenu').classList.toggle('active');
}

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwk55j8m-jTLEug1QZVOU3wKSSc6P4RAmdzuugyyO4jHUBY3ifwVGjIFe8K1n567ec9BQ/exec";

function abrir() { document.getElementById('miModal').style.display='flex'; }
function cerrar() { document.getElementById('miModal').style.display='none'; }

async function cargar() {
    try {
        const res = await fetch(SCRIPT_URL);
        const datos = await res.json();
        const muro = document.getElementById('muro');
        muro.innerHTML = "";

        if(datos.length === 0) {
            muro.innerHTML = "<p style='text-align:center;'>Sé la primera en compartir su experiencia.</p>";
            return;
        }

        datos.reverse().forEach(f => {
            muro.innerHTML += `
                <div class="tarjeta">
                    <span class="nombre-15">Quinceañera: ${f[1]}</span>
                    <p class="texto-comentario">"${f[3]}"</p>
                </div>`;
        });
    } catch (e) { console.log(e); }
}

async function guardar() {
    const q = document.getElementById('q').value;
    const t = document.getElementById('t').value;
    const m = document.getElementById('m').value;
    const b = document.getElementById('btnPub');

    if(!q || !t || !m) return alert("Completa los campos");

    b.disabled = true;
    b.innerText = "Publicando...";

    await fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({ quinceanera: q, telefono: t, mensaje: m })
    });

    cerrar();
    location.reload();
}

cargar();
</script>

</body>
</html>
