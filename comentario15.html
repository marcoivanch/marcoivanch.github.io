<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muro de Recuerdos | Marco Cabrera</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --dorado: #f8e4a1;
            --vino-tinto: #660000;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            /* Imagen de fondo fija */
            background: url('quince 2.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            height: 100vh;
            overflow: hidden; /* Evita que toda la web se mueva, solo se mueven los comentarios */
        }

        /* --- CONTENEDOR DE COMENTARIOS (CON SCROLL) --- */
        .vitrina-scroll {
            position: absolute;
            top: 140px; /* Espacio para que se vea tu cara arriba */
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 700px;
            height: calc(100vh - 200px); /* Ajuste automático según la pantalla */
            overflow-y: auto; /* Permite miles de comentarios sin fin */
            padding-right: 10px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* Personalización de la barra de desplazamiento */
        .vitrina-scroll::-webkit-scrollbar { width: 5px; }
        .vitrina-scroll::-webkit-scrollbar-thumb { background: var(--dorado); border-radius: 10px; }

        /* --- TARJETA DE COMENTARIO --- */
        .tarjeta {
            background: rgba(0, 0, 0, 0.4); /* Transparencia elegante */
            border-left: 4px solid var(--dorado);
            padding: 25px;
            backdrop-filter: blur(6px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: fadeIn 0.8s ease;
        }

        .nombre-15 { 
            font-family: 'Cinzel', serif; 
            color: var(--dorado); 
            font-size: 1.1rem; 
            font-weight: bold;
            display: block;
            margin-bottom: 10px;
        }

        .texto-comentario { 
            font-style: italic; 
            font-size: 1.05rem; 
            line-height: 1.6;
            margin: 0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        /* --- BOTONES Y MODAL --- */
        .btn-abrir {
            position: fixed;
            top: 25px;
            right: 25px;
            background: var(--vino-tinto);
            color: white;
            border: 1px solid var(--dorado);
            padding: 12px 20px;
            font-family: 'Cinzel';
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #000;
            border: 1px solid var(--dorado);
            padding: 30px;
            width: 90%;
            max-width: 400px;
        }

        input, textarea {
            width: 100%; margin-bottom: 15px; padding: 12px;
            background: #111; border: 1px solid #444; color: white;
            box-sizing: border-box;
        }

        .btn-enviar {
            width: 100%; padding: 15px; background: var(--vino-tinto); color: white;
            border: 1px solid var(--dorado); cursor: pointer; font-family: 'Cinzel';
            font-weight: bold;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <button class="btn-abrir" onclick="abrir()"><i class="fas fa-pen-fancy"></i> ESCRIBIR MI COMENTARIO</button>

    <div id="muro" class="vitrina-scroll">
        <p style="text-align:center; color:var(--dorado); margin-top: 50px;">Cargando testimonios de éxito...</p>
    </div>

    <div id="miModal" class="modal">
        <div class="modal-content">
            <h2 style="font-family:'Cinzel'; color:var(--dorado); margin-top:0;">Cuéntanos tu Experiencia</h2>
            <input type="text" id="q" placeholder="Nombre de la Quinceañera" required>
            <input type="text" id="t" placeholder="Tu Celular" required>
            <textarea id="m" rows="4" placeholder="Tu mensaje..." required></textarea>
            <button class="btn-enviar" id="btnPub" onclick="guardar()">PUBLICAR COMENTARIO</button>
            <p onclick="cerrar()" style="text-align:center; cursor:pointer; color:#777; font-size:0.8rem; margin-top:15px;">Volver</p>
        </div>
    </div>

    <script>
        // TU URL DE GOOGLE APPS SCRIPT
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwk55j8m-jTLEug1QZVOU3wKSSc6P4RAmdzuugyyO4jHUBY3ifwVGjIFe8K1n567ec9BQ/exec";

        function abrir() { document.getElementById('miModal').style.display='flex'; }
        function cerrar() { document.getElementById('miModal').style.display='none'; }

        // CARGAR COMENTARIOS AUTOMÁTICAMENTE
        async function cargar() {
            try {
                const res = await fetch(SCRIPT_URL);
                const datos = await res.json();
                const muro = document.getElementById('muro');
                muro.innerHTML = "";

                if(datos.length === 0) {
                    muro.innerHTML = "<p style='text-align:center;'>Sé la primera en compartir su experiencia.</p>";
                    return;
                }

                // Los últimos comentarios aparecen arriba
                datos.reverse().forEach(f => {
                    muro.innerHTML += `
                        <div class="tarjeta">
                            <span class="nombre-15">Quinceañera: ${f[1]}</span>
                            <p class="texto-comentario">"${f[3]}"</p>
                        </div>`;
                });
            } catch (e) { console.log(e); }
        }

        // ENVIAR COMENTARIO AL EXCEL
        async function guardar() {
            const q = document.getElementById('q').value;
            const t = document.getElementById('t').value;
            const m = document.getElementById('m').value;
            const b = document.getElementById('btnPub');

            if(!q || !t || !m) return alert("Completa los campos");

            b.disabled = true;
            b.innerText = "Publicando...";

            await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ quinceanera: q, telefono: t, mensaje: m })
            });

            cerrar();
            location.reload(); // Recarga para mostrar el nuevo comentario
        }

        cargar();
    </script>
</body>
</html>
